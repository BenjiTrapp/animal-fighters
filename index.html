<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Animal Fighters</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
canvas { display: block; image-rendering: pixelated; }
</style>
</head>
<body>
<canvas id="gc" width="960" height="540"></canvas>
<script>// ============================================================
// ANIMAL FIGHTERS
// Complete Fighting Game with Detailed Character Sprites
// ============================================================

const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const W = 960, H = 540;

// Game States
const STATE = { INTRO: 0, SELECT: 1, FIGHT: 2, GAMEOVER: 3 };
let gameState = STATE.INTRO;
let introTimer = 0;
let introPhase = 0;

// Audio Context
let audioCtx = null;
let masterGain = null;
let musicPlaying = false;
let currentTrack = null;

// Characters
const CHARS = [
  { name: 'JUDO PANDA', style: 'Judo', speed: 3, power: 9, defense: 8, hp: 110, color: '#ffffff' },
  { name: 'NINJA RACCOON', style: 'Ninjutsu', speed: 10, power: 7, defense: 5, hp: 90, color: '#708090' },
  { name: 'KARATE DOG', style: 'Karate', speed: 6, power: 8, defense: 7, hp: 100, color: '#DAA520' }
];

// Player/Game state
let p1 = { char: 0, x: 200, y: 380, hp: 100, maxHp: 100, vx: 0, vy: 0, facing: 1, state: 'idle', attackType: '', attackTimer: 0, attackAnimFrame: 0, hitTimer: 0, blockTimer: 0, wins: 0, animFrame: 0, jumpY: 0, crouching: false, comboCount: 0, _hitRegistered: false, thrown: false, thrownTimer: 0 };
let p2 = { char: 1, x: 700, y: 380, hp: 100, maxHp: 100, vx: 0, vy: 0, facing: -1, state: 'idle', attackType: '', attackTimer: 0, attackAnimFrame: 0, hitTimer: 0, blockTimer: 0, wins: 0, animFrame: 0, jumpY: 0, crouching: false, comboCount: 0, _hitRegistered: false, thrown: false, thrownTimer: 0 };

let selectCursor = 0;
let selectConfirmed = false;
let p2Char = 1;
let roundNum = 1;
let roundTimer = 99;
let roundTimerFrame = 0;
let roundStartTimer = 0;
let roundOver = false;
let gameOverTimer = 0;
let winner = '';
let particles = [];
let screenShake = 0;
let frameCount = 0;

// Keys
const keys = {};
document.addEventListener('keydown', e => { keys[e.key] = true; if (e.key !== e.key.toLowerCase()) keys[e.key.toLowerCase()] = true; if (e.code) keys[e.code] = true; if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'ArrowDown') e.preventDefault(); if (gameState === STATE.INTRO && introPhase < 3) introPhase = 3; initAudio(); });
document.addEventListener('keyup', e => { keys[e.key] = false; if (e.key !== e.key.toLowerCase()) keys[e.key.toLowerCase()] = false; if (e.code) keys[e.code] = false; });

// ============================================================
// MUSIC ENGINE - MK-Style Dark Aggressive Music
// ============================================================
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.3;
  masterGain.connect(audioCtx.destination);
}

function playNote(freq, duration, type, gain, startTime, detune) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.value = freq;
  if (detune) osc.detune.value = detune;
  g.gain.setValueAtTime(gain || 0.1, startTime);
  g.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.connect(g);
  g.connect(masterGain);
  osc.start(startTime);
  osc.stop(startTime + duration);
}

function playDrum(type, startTime) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  if (type === 'kick') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, startTime);
    osc.frequency.exponentialRampToValueAtTime(30, startTime + 0.15);
    g.gain.setValueAtTime(0.5, startTime);
    g.gain.exponentialRampToValueAtTime(0.001, startTime + 0.2);
  } else if (type === 'snare') {
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(200, startTime);
    osc.frequency.exponentialRampToValueAtTime(50, startTime + 0.1);
    g.gain.setValueAtTime(0.3, startTime);
    g.gain.exponentialRampToValueAtTime(0.001, startTime + 0.15);
    const noise = audioCtx.createOscillator();
    const ng = audioCtx.createGain();
    noise.type = 'sawtooth';
    noise.frequency.value = 3000;
    ng.gain.setValueAtTime(0.15, startTime);
    ng.gain.exponentialRampToValueAtTime(0.001, startTime + 0.1);
    noise.connect(ng); ng.connect(masterGain);
    noise.start(startTime); noise.stop(startTime + 0.1);
  } else if (type === 'hihat') {
    osc.type = 'sawtooth';
    osc.frequency.value = 6000;
    g.gain.setValueAtTime(0.08, startTime);
    g.gain.exponentialRampToValueAtTime(0.001, startTime + 0.05);
  }
  osc.connect(g); g.connect(masterGain);
  osc.start(startTime); osc.stop(startTime + 0.3);
}

function playIntroMusic() {
  if (!audioCtx) return;
  const bpm = 85;
  const beatLen = 60 / bpm;
  const t = audioCtx.currentTime + 0.1;
  const bassNotes = [55, 55, 65.4, 55, 55, 73.4, 55, 82.4];
  for (let i = 0; i < 16; i++) {
    const note = bassNotes[i % bassNotes.length];
    playNote(note, beatLen * 0.8, 'sawtooth', 0.15, t + i * beatLen);
    playDrum('kick', t + i * beatLen);
    if (i % 2 === 1) playDrum('snare', t + i * beatLen);
    playDrum('hihat', t + i * beatLen + beatLen * 0.5);
    if (i % 4 === 0) playNote(note * 4, beatLen * 0.3, 'square', 0.06, t + i * beatLen);
  }
  // Dark melody
  const melody = [220, 196, 165, 147, 165, 196, 220, 262, 220, 196, 165, 147, 131, 147, 165, 196];
  for (let i = 0; i < 16; i++) {
    playNote(melody[i], beatLen * 0.6, 'square', 0.07, t + i * beatLen, -5);
  }
}

function playSelectMusic() {
  if (!audioCtx) return;
  const bpm = 100;
  const beatLen = 60 / bpm;
  const t = audioCtx.currentTime + 0.1;
  const bassLine = [82.4, 82.4, 98, 110, 82.4, 82.4, 73.4, 82.4];
  for (let i = 0; i < 24; i++) {
    const note = bassLine[i % bassLine.length];
    playNote(note, beatLen * 0.5, 'sawtooth', 0.12, t + i * beatLen);
    playDrum('kick', t + i * beatLen);
    if (i % 2 === 1) playDrum('snare', t + i * beatLen);
    playDrum('hihat', t + i * beatLen);
    playDrum('hihat', t + i * beatLen + beatLen * 0.5);
    if (i % 2 === 0) playNote(note * 3, beatLen * 0.2, 'triangle', 0.05, t + i * beatLen + beatLen * 0.25);
  }
  const selMelody = [330, 392, 440, 392, 330, 294, 330, 392, 440, 523, 440, 392, 330, 294, 262, 294];
  for (let i = 0; i < 16; i++) {
    playNote(selMelody[i], beatLen * 0.4, 'square', 0.06, t + i * beatLen * 1.5);
  }
}

function playFightMusic() {
  if (!audioCtx) return;
  const bpm = 140;
  const beatLen = 60 / bpm;
  const t = audioCtx.currentTime + 0.1;
  const bassLine = [110, 110, 130.8, 110, 146.8, 130.8, 110, 98];
  for (let i = 0; i < 32; i++) {
    const note = bassLine[i % bassLine.length];
    playNote(note, beatLen * 0.4, 'sawtooth', 0.13, t + i * beatLen, 3);
    playDrum('kick', t + i * beatLen);
    if (i % 2 === 1) playDrum('snare', t + i * beatLen);
    playDrum('hihat', t + i * beatLen);
    if (i % 4 === 2) playDrum('hihat', t + i * beatLen + beatLen * 0.25);
    // Power chords
    if (i % 4 === 0) {
      playNote(note * 2, beatLen * 0.3, 'sawtooth', 0.08, t + i * beatLen);
      playNote(note * 3, beatLen * 0.3, 'sawtooth', 0.05, t + i * beatLen);
    }
  }
  const fightMelody = [440, 523, 587, 523, 440, 392, 440, 523, 587, 659, 587, 523, 440, 392, 349, 392];
  for (let i = 0; i < 16; i++) {
    playNote(fightMelody[i], beatLen * 0.35, 'square', 0.06, t + (i * 2) * beatLen);
  }
}

let musicInterval = null;
let musicAudio = null;
function startMusic(track) {
  stopMusic();
  if (track === 'intro') {
    musicAudio = new Audio('intro.mp3');
    musicAudio.loop = true;
    musicAudio.volume = 0.7;
    musicAudio.play().catch(() => {});
  } else if (track === 'select') {
    musicAudio = new Audio('fighter_select.mp3');
    musicAudio.loop = true;
    musicAudio.volume = 0.7;
    musicAudio.play().catch(() => {});
  } else if (track === 'fight') {
    musicAudio = new Audio('fight.mp3');
    musicAudio.loop = true;
    musicAudio.volume = 0.7;
    musicAudio.play().catch(() => {});
  }
  currentTrack = track;
}
function stopMusic() {
  if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
  if (musicAudio) { musicAudio.pause(); musicAudio.currentTime = 0; musicAudio = null; }
}

// Sound Effects
function playSFX(type) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  if (type === 'hit') {
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = 'sawtooth'; o.frequency.setValueAtTime(800, t); o.frequency.exponentialRampToValueAtTime(100, t+0.1);
    g.gain.setValueAtTime(0.3, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.12);
    o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.12);
  } else if (type === 'heavyhit') {
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = 'sawtooth'; o.frequency.setValueAtTime(400, t); o.frequency.exponentialRampToValueAtTime(40, t+0.2);
    g.gain.setValueAtTime(0.4, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.25);
    o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.25);
    playDrum('kick', t);
  } else if (type === 'select') {
    playNote(523, 0.1, 'square', 0.15, t); playNote(659, 0.1, 'square', 0.15, t+0.08);
  } else if (type === 'confirm') {
    playNote(523, 0.08, 'square', 0.12, t); playNote(659, 0.08, 'square', 0.12, t+0.06);
    playNote(784, 0.15, 'square', 0.12, t+0.12);
  } else if (type === 'ko') {
    for (let i = 0; i < 6; i++) playNote(200 + i * 50, 0.3, 'sawtooth', 0.12 - i*0.015, t + i*0.12);
    playDrum('kick', t); playDrum('snare', t+0.2); playDrum('kick', t+0.4);
  } else if (type === 'slam') {
    // Ground slam impact sound
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = 'sawtooth'; o.frequency.setValueAtTime(120, t); o.frequency.exponentialRampToValueAtTime(30, t+0.3);
    g.gain.setValueAtTime(0.5, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.35);
    o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.35);
    playDrum('kick', t); playDrum('kick', t+0.05); playDrum('snare', t+0.1);
  } else if (type === 'round') {
    playNote(392, 0.15, 'square', 0.12, t); playNote(523, 0.2, 'square', 0.12, t+0.15);
  } else if (type === 'block') {
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = 'triangle'; o.frequency.value = 300;
    g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.08);
    o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.08);
  }
}

// ============================================================
// DETAILED CHARACTER PORTRAIT DRAWING FUNCTION
// ============================================================
function drawCharacterPortrait(ctx, charIdx, x, y, scale, options) {
  const opt = options || {};
  const facing = opt.facing || 1;
  const state = opt.state || 'idle';
  const attackType = opt.attackType || '';
  const animFrame = opt.animFrame || 0;
  const breathe = opt.breathe !== undefined ? opt.breathe : Math.sin(frameCount * 0.05) * 2;
  const isCrouching = opt.crouching || false;
  
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(facing * scale, scale);
  
  // Animation offsets
  let bodyOffY = breathe;
  let armLAngle = 0, armRAngle = 0;
  let legLAngle = 0, legRAngle = 0;
  let headTilt = 0;
  let crouchSquish = isCrouching ? 0.7 : 1;
  
  if (state === 'idle') {
    armLAngle = Math.sin(animFrame * 0.08) * 0.1 - 0.3;
    armRAngle = Math.sin(animFrame * 0.08 + 1) * 0.1 + 0.3;
    legLAngle = Math.sin(animFrame * 0.06) * 0.05;
    legRAngle = -Math.sin(animFrame * 0.06) * 0.05;
  } else if (state === 'walk') {
    armLAngle = Math.sin(animFrame * 0.2) * 0.5;
    armRAngle = -Math.sin(animFrame * 0.2) * 0.5;
    legLAngle = Math.sin(animFrame * 0.2) * 0.4;
    legRAngle = -Math.sin(animFrame * 0.2) * 0.4;
    bodyOffY += Math.abs(Math.sin(animFrame * 0.2)) * 2;
  } else if (state === 'attack') {
    if (attackType === 'lowpunch' || attackType === 'highpunch') {
      armRAngle = 1.2 - Math.min(1, animFrame * 0.15) * 2.5;
      bodyOffY -= 3;
    } else if (attackType === 'lowkick') {
      legRAngle = 0.3 - Math.min(1, animFrame * 0.12) * 1.8;
      bodyOffY -= 2;
    } else if (attackType === 'highkick') {
      legRAngle = 0.5 - Math.min(1, animFrame * 0.12) * 2.5;
      bodyOffY -= 5;
      armLAngle = -0.5;
    } else if (attackType === 'judothrow') {
      // Judo throw: crouch, reach forward with both arms, then lift
      const f = Math.min(1, animFrame * 0.08);
      if (f < 0.4) {
        // Reach forward (grab phase)
        armLAngle = -0.3 - f * 3;
        armRAngle = -0.3 - f * 3;
        bodyOffY += 8;
        legLAngle = 0.4;
        legRAngle = 0.4;
      } else {
        // Lift and flip (throw phase)
        const t = (f - 0.4) / 0.6;
        armLAngle = -1.5 + t * 3.5;
        armRAngle = -1.5 + t * 3.5;
        bodyOffY -= t * 12;
        headTilt = -0.2;
        legLAngle = -0.3 * t;
        legRAngle = 0.2;
      }
    } else if (attackType === 'shoulderslam') {
      // Shoulder slam: lean forward, drive with shoulder
      const f = Math.min(1, animFrame * 0.1);
      bodyOffY += 5 - f * 10;
      headTilt = 0.3 - f * 0.4;
      armLAngle = 0.8 - f * 1.5;
      armRAngle = 0.8 - f * 1.5;
      legLAngle = -0.5 * f;
      legRAngle = 0.6 * (1 - f);
    }
  } else if (state === 'hit') {
    if (opt.thrown) {
      // Spinning in the air from judo throw
      const spin = opt.thrownTimer * 0.35;
      ctx.rotate(spin);
      armLAngle = -0.8;
      armRAngle = 0.8;
      legLAngle = -0.5;
      legRAngle = 0.5;
    } else {
      bodyOffY += 3;
      headTilt = 0.15;
      armLAngle = 0.3;
      armRAngle = 0.5;
    }
  } else if (state === 'block') {
    armLAngle = -0.8;
    armRAngle = -0.6;
    bodyOffY += 2;
  } else if (state === 'jump') {
    armLAngle = -0.7;
    armRAngle = -0.7;
    legLAngle = -0.3;
    legRAngle = 0.3;
  } else if (state === 'knockdown') {
    // Lying flat on the ground
    ctx.rotate(Math.PI / 2);
    bodyOffY += 35;
    armLAngle = 0.3;
    armRAngle = 0.3;
    legLAngle = 0.1;
    legRAngle = 0.1;
  } else if (state === 'getup') {
    // Getting up from ground
    const t = 1 - (opt.getupTimer || 0) / 20;
    ctx.rotate((Math.PI / 2) * (1 - t));
    bodyOffY += 35 * (1 - t);
    armLAngle = -0.5 * t;
    armRAngle = -0.5 * t;
    legLAngle = 0.4 * (1 - t);
    legRAngle = 0.4 * (1 - t);
  } else if (state === 'ko') {
    ctx.rotate(Math.PI / 2 * Math.min(1, animFrame * 0.05));
    bodyOffY += animFrame * 0.5;
  }
  
  if (isCrouching) {
    bodyOffY += 15;
    legLAngle = 0.8;
    legRAngle = 0.8;
    armLAngle -= 0.2;
    armRAngle += 0.2;
  }

  // Draw based on character
  if (charIdx === 0) drawPanda(ctx, bodyOffY, armLAngle, armRAngle, legLAngle, legRAngle, headTilt, crouchSquish, animFrame, state, attackType);
  else if (charIdx === 1) drawRaccoon(ctx, bodyOffY, armLAngle, armRAngle, legLAngle, legRAngle, headTilt, crouchSquish, animFrame, state, attackType);
  else if (charIdx === 2) drawDog(ctx, bodyOffY, armLAngle, armRAngle, legLAngle, legRAngle, headTilt, crouchSquish, animFrame, state, attackType);
  
  ctx.restore();
}

// ============================================================
// JUDO PANDA - Detailed Drawing
// ============================================================
function drawPanda(ctx, bodyOffY, armLA, armRA, legLA, legRA, headTilt, crouchSquish, animFrame, state, attackType) {
  const by = bodyOffY;
  
  // === BACK LEG (left leg) ===
  ctx.save();
  ctx.translate(-8, 20 + by);
  ctx.rotate(legLA);
  // Gi pants - left leg
  ctx.fillStyle = '#f0f0f0';
  ctx.beginPath();
  ctx.moveTo(-7, 0);
  ctx.lineTo(-9, 20);
  ctx.lineTo(-10, 40);
  ctx.lineTo(6, 40);
  ctx.lineTo(7, 20);
  ctx.lineTo(5, 0);
  ctx.closePath();
  ctx.fill();
  // Pants shading
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.fillRect(-9, 5, 4, 30);
  // Fabric wrinkles
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(-5, 8); ctx.quadraticCurveTo(0, 10, 4, 8);
  ctx.moveTo(-6, 18); ctx.quadraticCurveTo(-1, 20, 4, 17);
  ctx.moveTo(-7, 28); ctx.quadraticCurveTo(-2, 31, 5, 28);
  ctx.stroke();
  // Foot
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.ellipse(-2, 43, 8, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  // Toe pads
  ctx.fillStyle = '#3a3a3a';
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.ellipse(-5 + i * 3, 41, 1.5, 1.2, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
  
  // === FRONT LEG (right leg) ===
  ctx.save();
  ctx.translate(8, 20 + by);
  ctx.rotate(legRA);
  // Gi pants - right leg
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.moveTo(-6, 0);
  ctx.lineTo(-8, 20);
  ctx.lineTo(-9, 40);
  ctx.lineTo(7, 40);
  ctx.lineTo(8, 20);
  ctx.lineTo(6, 0);
  ctx.closePath();
  ctx.fill();
  // Pants highlight
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillRect(2, 5, 4, 30);
  // Pants shadow
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  ctx.fillRect(-8, 5, 4, 30);
  // Fabric wrinkles
  ctx.strokeStyle = 'rgba(0,0,0,0.12)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(-4, 10); ctx.quadraticCurveTo(1, 12, 5, 10);
  ctx.moveTo(-5, 22); ctx.quadraticCurveTo(0, 24, 5, 21);
  ctx.moveTo(-6, 33); ctx.quadraticCurveTo(-1, 35, 5, 32);
  ctx.stroke();
  // Foot
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.ellipse(0, 43, 9, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  // Toe pads
  ctx.fillStyle = '#3a3a3a';
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.ellipse(-4 + i * 3, 41, 1.5, 1.2, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
  
  // === BODY / TORSO (Judo Gi) ===
  ctx.save();
  ctx.translate(0, by);
  // Main gi body
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.moveTo(-18, -25);
  ctx.lineTo(-20, 20);
  ctx.lineTo(-15, 25);
  ctx.lineTo(15, 25);
  ctx.lineTo(20, 20);
  ctx.lineTo(18, -25);
  ctx.closePath();
  ctx.fill();
  // Gi shading - left side shadow
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.beginPath();
  ctx.moveTo(-18, -25); ctx.lineTo(-20, 20); ctx.lineTo(-12, 20); ctx.lineTo(-12, -25);
  ctx.closePath();
  ctx.fill();
  // Gi highlight - right side
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.moveTo(10, -20); ctx.lineTo(10, 15); ctx.lineTo(16, 15); ctx.lineTo(16, -20);
  ctx.closePath();
  ctx.fill();
  // Gi lapel V-shape
  ctx.strokeStyle = '#ddd';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-8, -25);
  ctx.lineTo(0, 5);
  ctx.lineTo(8, -25);
  ctx.stroke();
  // Inner lapel line
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-6, -23);
  ctx.lineTo(0, 0);
  ctx.lineTo(6, -23);
  ctx.stroke();
  // Chest fur visible in V
  ctx.fillStyle = '#f5f5f5';
  ctx.beginPath();
  ctx.moveTo(-5, -20);
  ctx.lineTo(0, -2);
  ctx.lineTo(5, -20);
  ctx.closePath();
  ctx.fill();
  // Chest fur texture
  ctx.strokeStyle = 'rgba(0,0,0,0.05)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.moveTo(-3 + i*1.5, -18 + i*3);
    ctx.lineTo(-2 + i*1.2, -14 + i*3);
    ctx.stroke();
  }
  // BLACK BELT

  for (let i = 0; i < 3; i++) {

  // HEADBAND (red hachimaki)

  ctx.fillStyle = '#cc2222';
  ctx.fillRect(-15, -10, 30, 3);

  ctx.fillStyle = '#cc2222';

  ctx.moveTo(-15, -9);
  ctx.quadraticCurveTo(-20, -8 + tailFlow, -25, -6 + tailFlow * 1.5);
  ctx.lineTo(-25, -8 + tailFlow * 1.5);
  ctx.quadraticCurveTo(-20, -10 + tailFlow, -15, -11);

  ctx.fill();
  // Second tail

  ctx.moveTo(-15, -10);
  ctx.quadraticCurveTo(-22, -12 + tailFlow * 0.5, -28, -10 + tailFlow);

  ctx.quadraticCurveTo(-22, -14 + tailFlow * 0.5, -15, -12);
  ctx.closePath();
  ctx.fill();
  
  ctx.restore();
}

  ctx.ellipse(-6, -3.5, 1.5, 1.8, 0, 0, Math.PI * 2);

  ctx.beginPath();
  ctx.ellipse(-5, -5, 1.2, 1, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(7, -5, 1.2, 1, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-10, -8); ctx.quadraticCurveTo(-6, -10, -3, -8);

  ctx.beginPath();
  ctx.moveTo(3, -8); ctx.quadraticCurveTo(6, -10, 10, -8);
  ctx.stroke();

  ctx.beginPath();
  ctx.ellipse(0, 3, 3.5, 2.5, 0, 0, Math.PI * 2);

  for (let i = 0; i < 8; i++) {

    ctx.moveTo(Math.cos(angle) * 3, -11 + Math.sin(angle) * 2.5);

  ctx.lineTo(-26, -10 + htFlow * 1.2);
  ctx.quadraticCurveTo(-22, -12 + htFlow, -17, -13);
  ctx.closePath();
  ctx.fill();
  
  ctx.restore();
}

// ============================================================
// BACKGROUND - Market Scene with Sunset
// ============================================================
function drawBackground() {
  // Sunset sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, 300);
  skyGrad.addColorStop(0, '#1a0a2e');
  skyGrad.addColorStop(0.3, '#4a1942');
  skyGrad.addColorStop(0.5, '#c2185b');
  skyGrad.addColorStop(0.7, '#ff6f00');
  skyGrad.addColorStop(1, '#ffab00');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, 350);
  
  // Sun
  ctx.fillStyle = '#ff8f00';
  ctx.beginPath();
  ctx.ellipse(480, 180, 50, 50, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,200,0,0.3)';
  ctx.beginPath();

function drawMarketStall(x, y, color) {

function drawLantern(x, y) {

  ctx.fill();

  ctx.strokeStyle = '#333';
  ctx.lineWidth = 0.5;
  ctx.beginPath();

  ctx.ellipse(x, y, 6, 9, 0, 0, Math.PI * 2);

  ctx.fillRect(x - 3, y - 9, 6, 2);

}

// ============================================================
// PARTICLES AND EFFECTS
// ============================================================
function addHitParticles(x, y, count, color) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x: x, y: y,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 0.5) * 8 - 3,
      life: 20 + Math.random() * 15,
      maxLife: 35,
      color: color || '#ffcc00',
      size: 2 + Math.random() * 4,
      type: 'hit'
    });
  }
}

function addDustParticles(x, y) {
  for (let i = 0; i < 5; i++) {
    particles.push({
      x: x + (Math.random() - 0.5) * 20,
      y: y,
      vx: (Math.random() - 0.5) * 3,
      vy: -Math.random() * 2,
      life: 15 + Math.random() * 10,
      maxLife: 25,
      color: '#aa8855',
      size: 3 + Math.random() * 5,
      type: 'dust'
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.3;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    if (p.type === 'hit') {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size, p.size, 0, 0, Math.PI * 2);
      ctx.fill();
      // Glow
      ctx.fillStyle = `rgba(255,255,200,${alpha * 0.3})`;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size * 2, p.size * 2, 0, 0, Math.PI * 2);
      ctx.fill();
    } else if (p.type === 'dust') {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = alpha * 0.5;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size, p.size * 0.7, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// INTRO SCREEN
// ============================================================
function updateIntro() {
  introTimer++;
  if (introTimer < 60) introPhase = 0;
  else if (introTimer < 120) introPhase = 1;
  else if (introTimer < 180) introPhase = 2;
  else introPhase = 3;
  
  if (introPhase >= 3 && (keys['Enter'] || keys[' '])) {
    gameState = STATE.SELECT;
    startMusic('select');
    keys['Enter'] = false;
    keys[' '] = false;
  }
}

function drawIntro() {
  // Dark background
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, W, H);
  
  // Flames effect at bottom
  for (let i = 0; i < 30; i++) {
    const fx = i * 32 + Math.sin(frameCount * 0.05 + i) * 10;
    const fh = 50 + Math.sin(frameCount * 0.08 + i * 0.7) * 30;
    const grad = ctx.createLinearGradient(fx, H, fx, H - fh);
    grad.addColorStop(0, 'rgba(255,100,0,0.8)');
    grad.addColorStop(0.5, 'rgba(255,50,0,0.4)');
    grad.addColorStop(1, 'rgba(255,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(fx - 15, H);
    ctx.quadraticCurveTo(fx, H - fh, fx + 15, H);
    ctx.fill();
  }
  
  // Phase-based reveal
  if (introPhase >= 0) {
    // Title background glow
    const glowSize = Math.min(1, introTimer / 60);
    ctx.fillStyle = `rgba(200,0,0,${0.2 * glowSize})`;
    ctx.beginPath();
    ctx.ellipse(480, 200, 300 * glowSize, 100 * glowSize, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  
  if (introPhase >= 1) {
    // Title text
    const titleScale = Math.min(1.2, (introTimer - 60) / 30);
    ctx.save();
    ctx.translate(480, 180);
    ctx.scale(titleScale, titleScale);
    ctx.font = 'bold 52px monospace';
    ctx.textAlign = 'center';
    // Text shadow
    ctx.fillStyle = '#880000';
    ctx.fillText('ANIMAL FIGHTERS', 3, 3);
    // Main text
    ctx.fillStyle = '#ff3333';
    ctx.fillText('ANIMAL FIGHTERS', 0, 0);
    // Text highlight
    ctx.fillStyle = 'rgba(255,200,100,0.4)';
    ctx.fillText('ANIMAL FIGHTERS', 0, -2);
    ctx.restore();
  }
  
  if (introPhase >= 2) {
    // Subtitle
    ctx.font = 'bold 22px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffcc00';
    ctx.fillText('ULTIMATE SHOWDOWN', 480, 230);
    
    // Character silhouettes
    const silAlpha = Math.min(1, (introTimer - 120) / 30);
    ctx.globalAlpha = silAlpha;
    drawCharacterPortrait(ctx, 0, 200, 400, 1.5, { facing: 1, state: 'idle', animFrame: frameCount });
    drawCharacterPortrait(ctx, 1, 480, 400, 1.5, { facing: 1, state: 'idle', animFrame: frameCount });
    drawCharacterPortrait(ctx, 2, 760, 400, 1.5, { facing: -1, state: 'idle', animFrame: frameCount });
    ctx.globalAlpha = 1;
  }
  
  if (introPhase >= 3) {
    // Press start blinking
    if (Math.floor(frameCount / 30) % 2 === 0) {
      ctx.font = 'bold 18px monospace';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#ffffff';
      ctx.fillText('PRESS ENTER TO START', 480, 500);
    }
  }
  
  ctx.textAlign = 'left';
}

// ============================================================
// CHARACTER SELECT SCREEN
// ============================================================
function updateSelect() {
  if (!selectConfirmed) {
    if (keys['ArrowLeft'] || keys['a']) { selectCursor = (selectCursor + 2) % 3; keys['ArrowLeft'] = false; keys['a'] = false; playSFX('select'); }
    if (keys['ArrowRight'] || keys['d']) { selectCursor = (selectCursor + 1) % 3; keys['ArrowRight'] = false; keys['d'] = false; playSFX('select'); }
    if (keys['Enter'] || keys[' ']) {
      selectConfirmed = true;
      p1.char = selectCursor;
      // AI picks a different character
      do { p2Char = Math.floor(Math.random() * 3); } while (p2Char === selectCursor);
      p2.char = p2Char;
      playSFX('confirm');
      keys['Enter'] = false;
      keys[' '] = false;
      setTimeout(() => {
        startFight();
      }, 1500);
    }
  }
}

  // Background

    ctx.fillStyle = '#888';
    ctx.fillText('< LEFT/RIGHT to select | ENTER to confirm >', 480, 530);
  }
  
  ctx.textAlign = 'left';
}

function drawHexagon(x, y, r) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI / 3) * i - Math.PI / 6;
    const px = x + r * Math.cos(angle);
    const py = y + r * Math.sin(angle);
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.stroke();
}

// ============================================================
// FIGHT LOGIC
// ============================================================
function startFight() {
  gameState = STATE.FIGHT;
  p1.x = 250; p1.y = 380; p1.hp = CHARS[p1.char].hp; p1.maxHp = CHARS[p1.char].hp;
  p1.vx = 0; p1.vy = 0; p1.state = 'idle'; p1.facing = 1;
  p1.attackTimer = 0; p1.hitTimer = 0; p1.blockTimer = 0;
  p1.jumpY = 0; p1.crouching = false; p1.comboCount = 0;
  p1.attackAnimFrame = 0; p1._hitRegistered = false; p1.attackType = '';
  
  p2.x = 710; p2.y = 380; p2.hp = CHARS[p2.char].hp; p2.maxHp = CHARS[p2.char].hp;
  p2.vx = 0; p2.vy = 0; p2.state = 'idle'; p2.facing = -1;
  p2.attackTimer = 0; p2.hitTimer = 0; p2.blockTimer = 0;
  p2.jumpY = 0; p2.crouching = false; p2.comboCount = 0;
  p2.attackAnimFrame = 0; p2._hitRegistered = false; p2.attackType = '';
  
  roundTimer = 99;
  roundTimerFrame = 0;
  roundStartTimer = 120;
  roundOver = false;
  particles = [];
  screenShake = 0;
  
  stopMusic();
  startMusic('fight');
  playSFX('round');
}

function updateFight() {
  if (roundStartTimer > 0) {
    roundStartTimer--;
    return;
  }
  
  if (roundOver) {
    gameOverTimer++;
    if (gameOverTimer > 120) {
      if (p1.wins >= 2 || p2.wins >= 2) {
        gameState = STATE.GAMEOVER;
        winner = p1.wins >= 2 ? 'P1' : 'P2';
        stopMusic();
      } else {
        roundNum++;
        startFight();
      }
    }
    return;
  }
  
  // Timer
  roundTimerFrame++;
  if (roundTimerFrame >= 60) {
    roundTimerFrame = 0;
    roundTimer--;
    if (roundTimer <= 0) {
      endRound();
      return;
    }
  }
  
  // Player input
  handlePlayerInput();
  
  // AI
  handleAI();
  
  // Physics
  updateFighter(p1);
  updateFighter(p2);
  
  // Facing
  if (p1.x < p2.x) { p1.facing = 1; p2.facing = -1; }
  else { p1.facing = -1; p2.facing = 1; }
  
  // Collision detection
  checkAttackCollision(p1, p2);
  checkAttackCollision(p2, p1);
  
  // Boundaries
  p1.x = Math.max(40, Math.min(W - 40, p1.x));
  p2.x = Math.max(40, Math.min(W - 40, p2.x));
  
  // Push apart if overlapping
  const dist = Math.abs(p1.x - p2.x);
  if (dist < 50) {
    const push = (50 - dist) / 2;
    if (p1.x < p2.x) { p1.x -= push; p2.x += push; }
    else { p1.x += push; p2.x -= push; }
  }
  
  // Check KO
  if (p1.hp <= 0) { p1.hp = 0; p1.state = 'ko'; endRound(); }
  if (p2.hp <= 0) { p2.hp = 0; p2.state = 'ko'; endRound(); }
  
  // Update particles
  updateParticles();
  
  // Screen shake decay
  if (screenShake > 0) screenShake *= 0.85;
  
  // Animation frame
  p1.animFrame++;
  p2.animFrame++;
}

function updateFighter(f) {
  // Gravity for jumps
  if (f.jumpY < 0) {
    f.vy += 1.0;
    f.jumpY += f.vy;
    if (f.thrown) f.thrownTimer++;
    if (f.jumpY >= 0) {
      f.jumpY = 0;
      f.vy = 0;
      if (f.state === 'jump') f.state = 'idle';
      // Ground slam - enter knockdown when thrown
      if (f.thrown) {
        f.state = 'knockdown';
        f.knockdownTimer = 35;
        f.thrown = false;
        f.thrownTimer = 0;
        addDustParticles(f.x - 20, f.y + 60);
        addDustParticles(f.x - 10, f.y + 60);
        addDustParticles(f.x, f.y + 60);
        addDustParticles(f.x + 10, f.y + 60);
        addDustParticles(f.x + 20, f.y + 60);
        screenShake = 14;
        playSFX('slam');
      } else {
        addDustParticles(f.x, f.y + 60);
      }
    }
  }
  
  // Knockdown timer - lie on ground then get up
  if (f.state === 'knockdown') {
    f.knockdownTimer = (f.knockdownTimer || 0) - 1;
    if (f.knockdownTimer <= 0) {
      f.state = 'getup';
      f.getupTimer = 20;
    }
    f.hitTimer = 0;
    return;
  }
  
  // Get up animation
  if (f.state === 'getup') {
    f.getupTimer = (f.getupTimer || 0) - 1;
    if (f.getupTimer <= 0) {
      f.state = 'idle';
    }
    return;
  }
  
  // Movement
  f.x += f.vx;
  f.vx *= 0.8;
  
  // Attack timer
  if (f.attackTimer > 0) {
    f.attackTimer--;
    f.attackAnimFrame = (f.attackAnimFrame || 0) + 1;
    if (f.attackTimer <= 0) {
      f.state = 'idle';
      f.attackType = '';
      f.attackAnimFrame = 0;
      f._hitRegistered = false;
    }
  }
  
  // Hit stun
  if (f.hitTimer > 0) {
    f.hitTimer--;
    if (f.hitTimer <= 0 && f.state === 'hit') f.state = 'idle';
  }
  
  // Block timer
  if (f.blockTimer > 0) {
    f.blockTimer--;
    if (f.blockTimer <= 0 && f.state === 'block') f.state = 'idle';
  }
}

function handlePlayerInput() {
  if (p1.state === 'ko' || p1.state === 'knockdown' || p1.state === 'getup' || p1.hitTimer > 0) return;
  
  const speed = CHARS[p1.char].speed * 0.5;
  let moving = false;
  
  // Crouching
  p1.crouching = keys['ArrowDown'] || false;
  
  if (p1.attackTimer <= 0) {
    // Movement (not while jumping)
    if (p1.state !== 'jump') {
      if (keys['ArrowLeft']) { p1.vx = -speed; moving = true; }
      if (keys['ArrowRight']) { p1.vx = speed; moving = true; }
    }
    
    // Jump
    if (keys['ArrowUp'] && p1.jumpY >= 0 && p1.state !== 'jump') {
      p1.jumpY = -1;
      p1.vy = -14;
      p1.state = 'jump';
      addDustParticles(p1.x, p1.y + 60);
    }
    
    // Attacks (allowed on ground and in air)
    if (keys['a']) { performAttack(p1, 'lowkick'); keys['a'] = false; }
    else if (keys['s']) { performAttack(p1, 'highkick'); keys['s'] = false; }
    else if (keys['d']) {
      if (p1.char === 0) { performAttack(p1, 'judothrow'); }
      else { performAttack(p1, 'lowpunch'); }
      keys['d'] = false;
    }
    else if (keys['f']) {
      if (p1.char === 0) { performAttack(p1, 'shoulderslam'); }
      else { performAttack(p1, 'highpunch'); }
      keys['f'] = false;
    }
    else if (keys[' '] && p1.state !== 'jump') {
      p1.state = 'block';
      p1.blockTimer = 20;
    }
    
    if (moving && p1.state !== 'attack' && p1.state !== 'jump') p1.state = 'walk';
    else if (!moving && p1.state === 'walk') p1.state = 'idle';
  }
}

function performAttack(fighter, type) {
  fighter.state = 'attack';
  fighter.attackType = type;
  const charSpeed = CHARS[fighter.char].speed;
  if (type === 'judothrow') {
    fighter.attackTimer = 22;
    fighter.vx = fighter.facing * 5;
    playSFX('heavyhit');
  } else if (type === 'shoulderslam') {
    fighter.attackTimer = 28;
    fighter.vx = fighter.facing * 8;
    playSFX('heavyhit');
  } else {
    fighter.attackTimer = Math.max(14, 25 - charSpeed);
  }
  fighter.attackAnimFrame = 0;
  fighter._hitRegistered = false;
}

function handleAI() {
  if (p2.state === 'ko' || p2.state === 'knockdown' || p2.state === 'getup' || p2.hitTimer > 0 || roundStartTimer > 0) return;
  
  const dist = Math.abs(p1.x - p2.x);
  const charData = CHARS[p2.char];
  const aiSpeed = charData.speed * 0.4;
  
  // AI decision making
  if (p2.attackTimer <= 0) {
    if (dist > 120) {
      // Move toward player
      p2.vx = p1.x < p2.x ? -aiSpeed : aiSpeed;
      p2.state = 'walk';
      // Occasional jump
      if (Math.random() < 0.01 && p2.jumpY >= 0) {
        p2.jumpY = -1;
        p2.vy = -13;
        p2.state = 'jump';
      }
    } else if (dist < 80) {
      // In attack range
      if (Math.random() < 0.1) {
        // Attack
        const attacks = ['lowpunch', 'highpunch', 'lowkick', 'highkick'];
        performAttack(p2, attacks[Math.floor(Math.random() * attacks.length)]);
      } else if (Math.random() < 0.02) {
        // Block
        p2.state = 'block';
        p2.blockTimer = 20;
      } else if (Math.random() < 0.03) {
        // Retreat
        p2.vx = p1.x < p2.x ? aiSpeed : -aiSpeed;
      }
      // AI crouching
      p2.crouching = Math.random() < 0.02;
    } else {
      // Medium range - approach or wait
      if (Math.random() < 0.04) {
        p2.vx = p1.x < p2.x ? -aiSpeed * 0.5 : aiSpeed * 0.5;
        p2.state = 'walk';
      } else {
        p2.state = 'idle';
      }
    }
  }
}

function checkAttackCollision(attacker, defender) {
  if (attacker.state !== 'attack') return;
  if (attacker._hitRegistered) return;
  
  // Active hit frames: attack hits during the middle portion of the animation
  // attackTimer counts DOWN from max to 0
  let maxTimer;
  if (attacker.attackType === 'judothrow') maxTimer = 22;
  else if (attacker.attackType === 'shoulderslam') maxTimer = 28;
  else maxTimer = Math.max(14, 25 - CHARS[attacker.char].speed);
  const elapsed = maxTimer - attacker.attackTimer;
  // Hit window: from 20% to 60% of the attack duration
  if (elapsed < maxTimer * 0.2 || elapsed > maxTimer * 0.6) return;
  
  const dist = Math.abs(attacker.x - defender.x);
  const isSpecial = attacker.attackType === 'judothrow' || attacker.attackType === 'shoulderslam';
  let range;
  if (attacker.attackType === 'judothrow') range = 55;
  else if (attacker.attackType === 'shoulderslam') range = 75;
  else range = attacker.attackType.includes('kick') ? 80 : 65;
  
  // Vertical check - high attacks miss crouching, low attacks always hit (specials always hit)
  if (!isSpecial && attacker.attackType.includes('high') && defender.crouching) return;
  
  if (dist < range) {
    // Check if defender is blocking (judo throw is unblockable)
    if (defender.state === 'block' && attacker.attackType !== 'judothrow') {
      playSFX('block');
      defender.blockTimer = 10;
      attacker._hitRegistered = true;
      addHitParticles((attacker.x + defender.x) / 2, attacker.y - 20, 3, '#4488ff');
      return;
    }
    
    // Calculate damage
    let damage = CHARS[attacker.char].power;
    if (attacker.attackType === 'highpunch') damage *= 1.3;
    else if (attacker.attackType === 'highkick') damage *= 1.5;
    else if (attacker.attackType === 'lowpunch') damage *= 0.8;
    else if (attacker.attackType === 'judothrow') damage *= 2.2;
    else if (attacker.attackType === 'shoulderslam') damage *= 1.8;
    else damage *= 1.0; // lowkick
    
    // Jump attack bonus
    if (attacker.jumpY < -5) damage *= 1.2;
    
    // Apply defense reduction
    damage = Math.max(4, damage - CHARS[defender.char].defense * 0.2);
    
    defender.hp -= damage;
    defender.state = 'hit';
    defender.hitTimer = attacker.attackType === 'judothrow' ? 40 : attacker.attackType === 'shoulderslam' ? 30 : 14;
    
    // Special attacks throw opponent into the air
    if (attacker.attackType === 'judothrow') {
      // Real judo throw: opponent flies OVER the attacker (opposite direction)
      defender.vx = -attacker.facing * 14;
      defender.vy = -22;
      defender.jumpY = -1;
      defender.thrown = true;
      defender.thrownTimer = 0;
    } else if (attacker.attackType === 'shoulderslam') {
      defender.vx = attacker.facing * 10;
      defender.vy = -14;
      defender.jumpY = -1;
      defender.thrown = true;
      defender.thrownTimer = 0;
    } else {
      const knockback = damage > 10 ? 6 : 3;
      defender.vx = attacker.facing * knockback;
    }
    
    defender.comboCount = 0;
    attacker.comboCount++;
    attacker._hitRegistered = true;
    
    // Effects
    const hitX = (attacker.x + defender.x) / 2;
    const hitY = attacker.attackType.includes('high') ? attacker.y - 30 + (attacker.jumpY||0) : attacker.y + (attacker.jumpY||0);
    if (attacker.attackType === 'judothrow' || attacker.attackType === 'shoulderslam') {
      addHitParticles(hitX, hitY, 20, '#ff6600');
      addHitParticles(hitX, hitY - 20, 12, '#ffcc00');
      addHitParticles(hitX, hitY, 8, '#ffffff');
      screenShake = 15;
    } else {
      addHitParticles(hitX, hitY, 8, '#ffcc00');
      screenShake = 5 + damage * 0.3;
    }
    
    if (attacker.attackType === 'judothrow' || attacker.attackType === 'shoulderslam' || damage > 10) playSFX('heavyhit');
    else playSFX('hit');
  }
}

function endRound() {
  if (roundOver) return;
  roundOver = true;
  gameOverTimer = 0;
  
  if (p1.hp <= 0) { p2.wins++; playSFX('ko'); }
  else if (p2.hp <= 0) { p1.wins++; playSFX('ko'); }
  else if (p1.hp > p2.hp) { p1.wins++; }
  else { p2.wins++; }
}

// ============================================================
// FIGHT SCREEN DRAWING
// ============================================================
function drawFight() {
  // Apply screen shake
  ctx.save();
  if (screenShake > 0.5) {
    ctx.translate(
      (Math.random() - 0.5) * screenShake,
      (Math.random() - 0.5) * screenShake
    );
  }
  
  // Background
  drawBackground();
  
  // Draw fighters
  const p1DrawY = p1.y + p1.jumpY;
  const p2DrawY = p2.y + p2.jumpY;
  
  // Shadow under fighters
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(p1.x, p1.y + 62, 25, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(p2.x, p2.y + 62, 25, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  
  // Draw P1
  drawCharacterPortrait(ctx, p1.char, p1.x, p1DrawY, 1.3, {
    facing: p1.facing,
    state: p1.state,
    attackType: p1.attackType,
    animFrame: p1.state === 'attack' ? p1.attackAnimFrame : p1.animFrame,
    breathe: Math.sin(frameCount * 0.05) * 1.5,
    crouching: p1.crouching,
    getupTimer: p1.getupTimer || 0,
    thrown: p1.thrown,
    thrownTimer: p1.thrownTimer || 0
  });
  
  // Draw P2
  drawCharacterPortrait(ctx, p2.char, p2.x, p2DrawY, 1.3, {
    facing: p2.facing,
    state: p2.state,
    attackType: p2.attackType,
    animFrame: p2.state === 'attack' ? p2.attackAnimFrame : p2.animFrame,
    breathe: Math.sin(frameCount * 0.05 + 1) * 1.5,
    crouching: p2.crouching,
    getupTimer: p2.getupTimer || 0,
    thrown: p2.thrown,
    thrownTimer: p2.thrownTimer || 0
  });
  
  // Particles
  drawParticles();
  
  ctx.restore();
  
  // HUD (not affected by screen shake)
  drawHealthBars();
  
  // Round start announcement
  if (roundStartTimer > 0) {
    ctx.font = 'bold 48px monospace';
    ctx.textAlign = 'center';
    if (roundStartTimer > 60) {
      ctx.fillStyle = '#ffcc00';
      ctx.fillText('ROUND ' + roundNum, 480, 280);
    } else {
      ctx.fillStyle = '#ff3333';
      ctx.fillText('FIGHT!', 480, 280);
    }
    ctx.textAlign = 'left';
  }
  
  // Round end announcement
  if (roundOver) {
    ctx.font = 'bold 42px monospace';
    ctx.textAlign = 'center';
    if (p1.hp <= 0 || p2.hp <= 0) {
      ctx.fillStyle = '#ff0000';
      ctx.fillText('K.O.!', 480, 250);
    }
    if (gameOverTimer > 60) {
      ctx.fillStyle = '#ffcc00';
      const roundWinner = p1.hp > p2.hp ? CHARS[p1.char].name : CHARS[p2.char].name;
      ctx.font = 'bold 28px monospace';
      ctx.fillText(roundWinner + ' WINS', 480, 300);
    }
    ctx.textAlign = 'left';
  }
  
  // Controls hint
  ctx.font = '10px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillText('Arrows:Move/Jump | A:LowKick S:HighKick D:Punch/Throw F:Punch/Slam | Space:Block', 120, 535);
}

// ============================================================
// GAME OVER SCREEN
// ============================================================
function drawGameOver() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, W, H);
  
  // Winner display
  const winChar = winner === 'P1' ? p1.char : p2.char;
  
  // Background glow
  ctx.fillStyle = 'rgba(255,200,0,0.05)';
  ctx.beginPath();
  ctx.ellipse(480, 300, 200, 200, 0, 0, Math.PI * 2);
  ctx.fill();
  
  // Draw winner character large
  drawCharacterPortrait(ctx, winChar, 480, 350, 2.5, {
    facing: 1,
    state: 'idle',
    animFrame: frameCount,
    breathe: Math.sin(frameCount * 0.04) * 2
  });
  
  // Winner text
  ctx.font = 'bold 42px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffcc00';
  ctx.fillText(CHARS[winChar].name, 480, 80);
  
  ctx.font = 'bold 32px monospace';
  ctx.fillStyle = '#ff3333';
  ctx.fillText('WINS!', 480, 120);
  
  // Flashing restart text
  if (Math.floor(frameCount / 30) % 2 === 0) {
    ctx.font = '16px monospace';
    ctx.fillStyle = '#ffffff';
    ctx.fillText('PRESS ENTER TO PLAY AGAIN', 480, 510);
  }
  
  ctx.textAlign = 'left';
  
  // Handle restart
  if (keys['Enter'] || keys[' ']) {
    gameState = STATE.SELECT;
    selectConfirmed = false;
    p1.wins = 0;
    p2.wins = 0;
    roundNum = 1;
    startMusic('select');
    keys['Enter'] = false;
    keys[' '] = false;
  }
}

// ============================================================
// MAIN GAME LOOP
// ============================================================
function gameLoop() {
  try {
  frameCount++;
  
  switch (gameState) {
    case STATE.INTRO:
      updateIntro();
      drawIntro();
      break;
    case STATE.SELECT:
      updateSelect();
      drawSelect();
      break;
    case STATE.FIGHT:
      updateFight();
      updateFight();
      drawFight();
      break;
    case STATE.GAMEOVER:
      drawGameOver();
      break;
  }
  } catch(err) {
    ctx.fillStyle = '#ff0000';
    ctx.font = '16px monospace';
    ctx.fillText('ERROR: ' + err.message, 10, 30);
    ctx.fillText('at: ' + err.stack.split('\n')[1], 10, 50);
  }
  
  requestAnimationFrame(gameLoop);
}

// Start intro music after first interaction
let introMusicStarted = false;
document.addEventListener('click', () => {
  initAudio();
  if (!introMusicStarted && gameState === STATE.INTRO) {
    startMusic('intro');
    introMusicStarted = true;
  }
});
document.addEventListener('keydown', () => {
  if (!introMusicStarted && gameState === STATE.INTRO) {
    startMusic('intro');
    introMusicStarted = true;
  }
}, { once: false });

// Start the game
gameLoop();
</script>
