  // Info panel at bottom
  const currentLvl = LEVELS[levelCursor];
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, 462, W, 78);
  ctx.strokeStyle = '#ffcc00';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, 462); ctx.lineTo(W, 462);
  ctx.stroke();
  
  // Level name and subtitle
  ctx.font = 'bold 22px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = currentLvl.color;
  ctx.fillText(currentLvl.name, 480, 492);
  
  ctx.font = '13px monospace';

  ctx.fillText('~ ' + currentLvl.subtitle + ' ~', 480, 512);
  
  // Instructions
  if (!levelConfirmed) {
    ctx.font = '11px monospace';
    ctx.fillStyle = '#888';
    ctx.fillText('< ARROWS to select | ENTER to confirm >', 480, 535);
  }
  
  // Draw mini preview of the selected level background
  drawLevelPreview(levelCursor);
  
  ctx.textAlign = 'left';
}

function drawStar(cx, cy, innerR, outerR, points) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const r = i % 2 === 0 ? outerR : innerR;
    const a = (i / (points * 2)) * Math.PI * 2 - Math.PI / 2;
    const px = cx + Math.cos(a) * r;
    const py = cy + Math.sin(a) * r;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
}

function shadeColor(hex, amt) {
  let r = parseInt(hex.slice(1,3), 16) + amt;
  let g = parseInt(hex.slice(3,5), 16) + amt;
  let b = parseInt(hex.slice(5,7), 16) + amt;
  r = Math.max(0, Math.min(255, r));
  g = Math.max(0, Math.min(255, g));
  b = Math.max(0, Math.min(255, b));
  return `rgb(${r},${g},${b})`;
}

// ============================================================
// FIGHT LOGIC
// ============================================================
function startFight() {
  gameState = STATE.FIGHT;
  p1.x = 250; p1.y = 380; p1.hp = CHARS[p1.char].hp; p1.maxHp = CHARS[p1.char].hp;
  p1.vx = 0; p1.vy = 0; p1.state = 'idle'; p1.facing = 1;
  p1.attackTimer = 0; p1.hitTimer = 0; p1.blockTimer = 0;
  p1.jumpY = 0; p1.crouching = false; p1.comboCount = 0;
  p1.attackAnimFrame = 0; p1._hitRegistered = false; p1.attackType = '';
  
  p2.x = 710; p2.y = 380; p2.hp = CHARS[p2.char].hp; p2.maxHp = CHARS[p2.char].hp;
  p2.vx = 0; p2.vy = 0; p2.state = 'idle'; p2.facing = -1;
  p2.attackTimer = 0; p2.hitTimer = 0; p2.blockTimer = 0;
  p2.jumpY = 0; p2.crouching = false; p2.comboCount = 0;
  p2.attackAnimFrame = 0; p2._hitRegistered = false; p2.attackType = '';
  
  roundTimer = 99;
  roundTimerFrame = 0;
  roundStartTimer = 120;
  roundOver = false;
  particles = [];
  projectiles = [];
  screenShake = 0;
  
  stopMusic();
  startMusic('fight');
  playSFX('round');
}

function updateFight() {
  if (roundStartTimer > 0) {
    roundStartTimer--;
    return;
  }
  
  if (roundOver) {
    gameOverTimer++;
    if (gameOverTimer > 120) {
      if (p1.wins >= 2 || p2.wins >= 2) {
        gameState = STATE.GAMEOVER;
        winner = p1.wins >= 2 ? 'P1' : 'P2';
        stopMusic();
      } else {
        roundNum++;
        startFight();
      }
    }
    return;
  }
  
  // Timer
  roundTimerFrame++;
  if (roundTimerFrame >= 60) {
    roundTimerFrame = 0;
    roundTimer--;
    if (roundTimer <= 0) {
      endRound();
      return;
    }
  }
  
  // Player input
  handlePlayerInput();
  
  // AI
  handleAI();
  
  // Physics
  updateFighter(p1);
  updateFighter(p2);
  
  // Facing
  if (p1.x < p2.x) { p1.facing = 1; p2.facing = -1; }
  else { p1.facing = -1; p2.facing = 1; }
  
  // Collision detection
  checkAttackCollision(p1, p2);
  checkAttackCollision(p2, p1);
  
  // Update projectiles (shurikens)
  updateProjectiles();
  
  // Boundaries
  p1.x = Math.max(40, Math.min(W - 40, p1.x));
  p2.x = Math.max(40, Math.min(W - 40, p2.x));
  
  // Push apart if overlapping
  const dist = Math.abs(p1.x - p2.x);
  if (dist < 50) {
    const push = (50 - dist) / 2;
    if (p1.x < p2.x) { p1.x -= push; p2.x += push; }
    else { p1.x += push; p2.x -= push; }
  }
  
  // Check KO
  if (p1.hp <= 0) { p1.hp = 0; p1.state = 'ko'; endRound(); }
  if (p2.hp <= 0) { p2.hp = 0; p2.state = 'ko'; endRound(); }
  
  // Update particles
  updateParticles();
  
  // Screen shake decay
  if (screenShake > 0) screenShake *= 0.85;
  
  // Animation frame
  p1.animFrame++;
  p2.animFrame++;
}

function updateFighter(f) {
  // Gravity for jumps
  if (f.jumpY < 0) {
    f.vy += 1.0;
    f.jumpY += f.vy;
    if (f.thrown) f.thrownTimer++;
    if (f.jumpY >= 0) {
      f.jumpY = 0;
      f.vy = 0;
      if (f.state === 'jump') f.state = 'idle';
      // Ground slam - enter knockdown when thrown
      if (f.thrown) {
        f.state = 'knockdown';
        f.knockdownTimer = 35;
        f.thrown = false;
        f.thrownTimer = 0;
        addDustParticles(f.x - 20, f.y + 60);
        addDustParticles(f.x - 10, f.y + 60);
        addDustParticles(f.x, f.y + 60);
        addDustParticles(f.x + 10, f.y + 60);
        addDustParticles(f.x + 20, f.y + 60);
        screenShake = 14;
        playSFX('slam');
      } else {
        addDustParticles(f.x, f.y + 60);
      }
    }
  }
  
  // Knockdown timer - lie on ground then get up
  if (f.state === 'knockdown') {
    f.knockdownTimer = (f.knockdownTimer || 0) - 1;
    if (f.knockdownTimer <= 0) {
      f.state = 'getup';
      f.getupTimer = 20;
    }
    f.hitTimer = 0;
    return;
  }
  
  // Get up animation
  if (f.state === 'getup') {
    f.getupTimer = (f.getupTimer || 0) - 1;
    if (f.getupTimer <= 0) {
      f.state = 'idle';
    }
    return;
  }
  
  // Movement
  f.x += f.vx;
  f.vx *= 0.8;
  
  // Attack timer
  if (f.attackTimer > 0) {
    f.attackTimer--;
    f.attackAnimFrame = (f.attackAnimFrame || 0) + 1;
    if (f.attackTimer <= 0) {
      f.state = 'idle';
      f.attackType = '';
      f.attackAnimFrame = 0;
      f._hitRegistered = false;
    }
  }
  
  // Hit stun
  if (f.hitTimer > 0) {
    f.hitTimer--;
    if (f.hitTimer <= 0 && f.state === 'hit') f.state = 'idle';
  }
  
  // Block timer
  if (f.blockTimer > 0) {
    f.blockTimer--;
    if (f.blockTimer <= 0 && f.state === 'block') f.state = 'idle';
  }
}

function handlePlayerInput() {
  if (p1.state === 'ko' || p1.state === 'knockdown' || p1.state === 'getup' || p1.hitTimer > 0) return;
  
  const speed = CHARS[p1.char].speed * 0.5;
  let moving = false;
  
  // Crouching
  p1.crouching = keys['ArrowDown'] || false;
  
  if (p1.attackTimer <= 0) {
    // Movement (not while jumping)
    if (p1.state !== 'jump') {
      if (keys['ArrowLeft']) { p1.vx = -speed; moving = true; }
      if (keys['ArrowRight']) { p1.vx = speed; moving = true; }
    }
    
    // Jump
    if (keys['ArrowUp'] && p1.jumpY >= 0 && p1.state !== 'jump') {
      p1.jumpY = -1;
      p1.vy = -14;
      p1.state = 'jump';
      addDustParticles(p1.x, p1.y + 60);
    }
    
    // Attacks (allowed on ground and in air)
    if (keys['a']) { performAttack(p1, 'lowkick'); keys['a'] = false; }
    else if (keys['s']) { performAttack(p1, 'highkick'); keys['s'] = false; }
    else if (keys['d']) {
      if (p1.char === 0 && Math.abs(p1.x - p2.x) < 90) { performAttack(p1, 'judothrow'); }
      else if (p1.char === 1) { performAttack(p1, 'shuriken'); }
      else { performAttack(p1, 'lowpunch'); }
      keys['d'] = false;
    }
    else if (keys['f']) {
      if (p1.char === 0 && Math.abs(p1.x - p2.x) < 90) { performAttack(p1, 'shoulderslam'); }
      else if (p1.char === 1) { performAttack(p1, 'swordslash'); }
      else { performAttack(p1, 'highpunch'); }
      keys['f'] = false;
    }
    else if (keys[' '] && p1.state !== 'jump') {
      p1.state = 'block';
      p1.blockTimer = 20;
    }
    
    if (moving && p1.state !== 'attack' && p1.state !== 'jump') p1.state = 'walk';
    else if (!moving && p1.state === 'walk') p1.state = 'idle';
  }
}

function performAttack(fighter, type) {
  fighter.state = 'attack';
  fighter.attackType = type;
  const charSpeed = CHARS[fighter.char].speed;
  if (type === 'judothrow') {
    fighter.attackTimer = 22;
    fighter.vx = fighter.facing * 5;
    playSFX('heavyhit');
  } else if (type === 'shoulderslam') {
    fighter.attackTimer = 28;
    fighter.vx = fighter.facing * 8;
    playSFX('heavyhit');
  } else if (type === 'shuriken') {
    fighter.attackTimer = 18;
    // Spawn shuriken projectile after brief wind-up
    setTimeout(() => {
      projectiles.push({
        x: fighter.x + fighter.facing * 30,
        y: fighter.y - 10 + (fighter.jumpY || 0),
        vx: fighter.facing * 12,
        vy: 0,
        owner: fighter,
        damage: CHARS[fighter.char].power * 0.5,
        timer: 60,
        type: 'shuriken'
      });
    }, 100);
    playSFX('hit');
  } else if (type === 'swordslash') {
    fighter.attackTimer = 20;
    fighter.vx = fighter.facing * 4;
    playSFX('heavyhit');
  } else {
    fighter.attackTimer = Math.max(14, 25 - charSpeed);
  }
  fighter.attackAnimFrame = 0;
  fighter._hitRegistered = false;
}

function handleAI() {
  if (p2.state === 'ko' || p2.state === 'knockdown' || p2.state === 'getup' || p2.hitTimer > 0 || roundStartTimer > 0) return;
  
  const dist = Math.abs(p1.x - p2.x);
  const charData = CHARS[p2.char];
  const aiSpeed = charData.speed * 0.4;
  
  // AI decision making
  if (p2.attackTimer <= 0) {
    if (dist > 120) {
      // Move toward player
      p2.vx = p1.x < p2.x ? -aiSpeed : aiSpeed;
      p2.state = 'walk';
      // Occasional jump
      if (Math.random() < 0.01 && p2.jumpY >= 0) {
        p2.jumpY = -1;
        p2.vy = -13;
        p2.state = 'jump';
      }
      // Raccoon AI: throw shuriken at range
      if (p2.char === 1 && dist > 200 && Math.random() < 0.04) {
        performAttack(p2, 'shuriken');
      }
    } else if (dist < 80) {
      // In attack range
      if (Math.random() < 0.1) {
        // Attack - raccoon prefers sword slash
        if (p2.char === 1 && Math.random() < 0.4) {
          performAttack(p2, 'swordslash');
        } else {
          const attacks = ['lowpunch', 'highpunch', 'lowkick', 'highkick'];
          performAttack(p2, attacks[Math.floor(Math.random() * attacks.length)]);
        }
      } else if (Math.random() < 0.02) {
        // Block
        p2.state = 'block';
        p2.blockTimer = 20;
      } else if (Math.random() < 0.03) {
        // Retreat
        p2.vx = p1.x < p2.x ? aiSpeed : -aiSpeed;
      }
      // AI crouching
      p2.crouching = Math.random() < 0.02;
    } else {
      // Medium range - approach or wait; raccoon may throw shuriken
      if (p2.char === 1 && Math.random() < 0.03) {
        performAttack(p2, 'shuriken');
      } else if (Math.random() < 0.04) {
        p2.vx = p1.x < p2.x ? -aiSpeed * 0.5 : aiSpeed * 0.5;
        p2.state = 'walk';
      } else {
        p2.state = 'idle';
      }
    }
  }
}

function checkAttackCollision(attacker, defender) {
  if (attacker.state !== 'attack') return;
  if (attacker._hitRegistered) return;
  // Shuriken uses projectile system, not melee collision
  if (attacker.attackType === 'shuriken') return;
  
  // Active hit frames: attack hits during the middle portion of the animation
  // attackTimer counts DOWN from max to 0
  let maxTimer;
  if (attacker.attackType === 'judothrow') maxTimer = 22;
  else if (attacker.attackType === 'shoulderslam') maxTimer = 28;
  else if (attacker.attackType === 'swordslash') maxTimer = 20;
  else maxTimer = Math.max(14, 25 - CHARS[attacker.char].speed);
  const elapsed = maxTimer - attacker.attackTimer;
  // Hit window: from 20% to 60% of the attack duration
  if (elapsed < maxTimer * 0.2 || elapsed > maxTimer * 0.6) return;
  
  const dist = Math.abs(attacker.x - defender.x);
  const isSpecial = attacker.attackType === 'judothrow' || attacker.attackType === 'shoulderslam' || attacker.attackType === 'swordslash';
  let range;
  if (attacker.attackType === 'judothrow') range = 55;
  else if (attacker.attackType === 'shoulderslam') range = 75;
  else if (attacker.attackType === 'swordslash') range = 95;
  else range = attacker.attackType.includes('kick') ? 80 : 65;
  
  // Vertical check - high attacks miss crouching, low attacks always hit (specials always hit)
  if (!isSpecial && attacker.attackType.includes('high') && defender.crouching) return;
  
  if (dist < range) {
    // Check if defender is blocking (judo throw is unblockable)
    if (defender.state === 'block' && attacker.attackType !== 'judothrow') {
      playSFX('block');
      defender.blockTimer = 10;
      attacker._hitRegistered = true;
      addHitParticles((attacker.x + defender.x) / 2, attacker.y - 20, 3, '#4488ff');
      return;
    }
    
    // Calculate damage
    let damage = CHARS[attacker.char].power;
    if (attacker.attackType === 'highpunch') damage *= 1.3;
    else if (attacker.attackType === 'highkick') damage *= 1.5;
    else if (attacker.attackType === 'lowpunch') damage *= 0.8;
    else if (attacker.attackType === 'judothrow') damage *= 2.2;
    else if (attacker.attackType === 'shoulderslam') damage *= 1.8;
    else if (attacker.attackType === 'swordslash') damage *= 1.7;
    else damage *= 1.0; // lowkick
    
    // Jump attack bonus
    if (attacker.jumpY < -5) damage *= 1.2;
    
    // Apply defense reduction
    damage = Math.max(4, damage - CHARS[defender.char].defense * 0.2);
    
    defender.hp -= damage;
    defender.state = 'hit';
    defender.hitTimer = attacker.attackType === 'judothrow' ? 40 
                      : attacker.attackType === 'shoulderslam' ? 30 
                      : attacker.attackType === 'swordslash' ? 20 
                      : 14;
    
    // Special attacks throw opponent into the air
    if (attacker.attackType === 'judothrow') {
      // Real judo throw: opponent flies OVER the attacker (opposite direction)
      defender.vx = -attacker.facing * 14;
      defender.vy = -22;
      defender.jumpY = -1;
      defender.thrown = true;
      defender.thrownTimer = 0;
    } else if (attacker.attackType === 'shoulderslam') {
      defender.vx = attacker.facing * 10;
      defender.vy = -14;
      defender.jumpY = -1;
      defender.thrown = true;
      defender.thrownTimer = 0;
    } else if (attacker.attackType === 'swordslash') {
      // Sword slash: strong knockback, slight lift
      defender.vx = attacker.facing * 9;
      defender.vy = -6;
      defender.jumpY = -1;
    } else {
      const knockback = damage > 10 ? 6 : 3;
      defender.vx = attacker.facing * knockback;
    }
    
    defender.comboCount = 0;
    attacker.comboCount++;
    attacker._hitRegistered = true;
    
    // Effects
    const hitX = (attacker.x + defender.x) / 2;
    const hitY = attacker.attackType.includes('high') ? attacker.y - 30 + (attacker.jumpY||0) : attacker.y + (attacker.jumpY||0);
    if (attacker.attackType === 'judothrow' || attacker.attackType === 'shoulderslam') {
      addHitParticles(hitX, hitY, 20, '#ff6600');
      addHitParticles(hitX, hitY - 20, 12, '#ffcc00');
      addHitParticles(hitX, hitY, 8, '#ffffff');
      screenShake = 15;
    } else if (attacker.attackType === 'swordslash') {
      addHitParticles(hitX, hitY, 15, '#aaddff');
      addHitParticles(hitX, hitY, 8, '#ffffff');
      screenShake = 10;
    } else {
      addHitParticles(hitX, hitY, 8, '#ffcc00');
      screenShake = 5 + damage * 0.3;
    }
    
    if (attacker.attackType === 'judothrow' || attacker.attackType === 'shoulderslam' || attacker.attackType === 'swordslash' || damage > 10) playSFX('heavyhit');
    else playSFX('hit');
  }
}

// Projectile system (shurikens)
function updateProjectiles() {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const proj = projectiles[i];
    proj.x += proj.vx;
    proj.y += proj.vy;
    proj.timer--;
    
    // Remove if off-screen or expired
    if (proj.timer <= 0 || proj.x < -50 || proj.x > W + 50) {
      projectiles.splice(i, 1);
      continue;
    }
    
    // Check collision with opponent
    const target = proj.owner === p1 ? p2 : p1;
    if (target.state === 'ko') continue;
    
    const dist = Math.abs(proj.x - target.x);
    const vDist = Math.abs(proj.y - (target.y + (target.jumpY || 0)));
    
    if (dist < 35 && vDist < 45) {
      // Hit!
      if (target.state === 'block') {
        // Blocked - reduced effect
        playSFX('block');
        addHitParticles(proj.x, proj.y, 4, '#4488ff');
        target.blockTimer = 8;
      } else {
        // Direct hit
        let damage = proj.damage;
        damage = Math.max(2, damage - CHARS[target.char].defense * 0.2);
        target.hp -= damage;
        target.state = 'hit';
        target.hitTimer = 8;
        target.vx = proj.vx > 0 ? 2 : -2;
        
        addHitParticles(proj.x, proj.y, 6, '#88ccff');
        screenShake = 2;
        playSFX('hit');
        
        if (target.hp <= 0) { target.hp = 0; target.state = 'ko'; endRound(); }
      }
      projectiles.splice(i, 1);
    }
  }
}

function drawProjectiles() {
  for (const proj of projectiles) {
    if (proj.type === 'shuriken') {
      drawShuriken(proj.x, proj.y, proj.vx);
    }
  }
}

function drawShuriken(x, y, vx) {
  ctx.save();
  ctx.translate(x, y);
  // Spin fast
  ctx.rotate(frameCount * 0.4);
  
  const size = 10;
  // Metallic shuriken (4-pointed star)
  ctx.fillStyle = '#c0c0c0';
  ctx.beginPath();
  for (let i = 0; i < 4; i++) {
    const angle = (i / 4) * Math.PI * 2;
    const outerX = Math.cos(angle) * size;
    const outerY = Math.sin(angle) * size;
    const innerAngle = angle + Math.PI / 4;
    const innerX = Math.cos(innerAngle) * size * 0.35;
    const innerY = Math.sin(innerAngle) * size * 0.35;
    if (i === 0) ctx.moveTo(outerX, outerY);
    else ctx.lineTo(outerX, outerY);
    ctx.lineTo(innerX, innerY);
  }
  ctx.closePath();
  ctx.fill();
  
  // Dark edge
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.stroke();
  
  // Center hole
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.ellipse(0, 0, 2.5, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();
  
  // Metallic shine
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.ellipse(-1, -1, 1.5, 1.5, 0, 0, Math.PI * 2);
  ctx.fill();
  
  // Trail effect (behind the shuriken based on direction)
  ctx.restore();
  const trailDir = vx > 0 ? -1 : 1;
  ctx.fillStyle = 'rgba(200,220,255,0.25)';
  ctx.beginPath();
  ctx.ellipse(x + trailDir * 12, y, 8, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(200,220,255,0.12)';
  ctx.beginPath();
  ctx.ellipse(x + trailDir * 22, y, 6, 2, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawSwordSlashEffect(fighter) {
  if (fighter.state !== 'attack' || fighter.attackType !== 'swordslash') return;
  
  const progress = fighter.attackAnimFrame / 20;
  if (progress < 0.15 || progress > 0.7) return;
  
  const slashProgress = (progress - 0.15) / 0.55;
  const fx = fighter.x + fighter.facing * 25;
  const fy = fighter.y + (fighter.jumpY || 0) - 15;
  
  ctx.save();
  ctx.translate(fx, fy);
  ctx.scale(fighter.facing, 1);
  
  // Sword blade
  const swordAngle = -1.2 + slashProgress * 2.8;
  ctx.save();
  ctx.rotate(swordAngle);
  // Blade
  ctx.fillStyle = '#d0d8e8';
  ctx.beginPath();
  ctx.moveTo(0, 0); ctx.lineTo(50, -3); ctx.lineTo(55, 0); ctx.lineTo(50, 3); ctx.lineTo(0, 0);
  ctx.closePath();
  ctx.fill();
  // Blade shine
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath();
  ctx.moveTo(5, -1); ctx.lineTo(45, -2); ctx.lineTo(45, 0); ctx.lineTo(5, 0);
  ctx.closePath();
  ctx.fill();
  // Handle/guard
  ctx.fillStyle = '#4a3020';
  ctx.fillRect(-8, -3, 10, 6);
  ctx.fillStyle = '#ccaa00';
  ctx.fillRect(-2, -5, 4, 10);
  ctx.restore();
  
  // Slash arc trail (crescent shape)
  const arcAlpha = (1 - slashProgress) * 0.7;
  ctx.strokeStyle = `rgba(200,230,255,${arcAlpha})`;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(0, 0, 45, swordAngle - 0.5, swordAngle + 0.3);
  ctx.stroke();
  
  // Secondary slash trail
  ctx.strokeStyle = `rgba(150,200,255,${arcAlpha * 0.5})`;
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.arc(0, 0, 40, swordAngle - 0.8, swordAngle + 0.1);
  ctx.stroke();
  
  // Sparkle at blade tip
  if (slashProgress > 0.3 && slashProgress < 0.6) {
    const tipX = Math.cos(swordAngle) * 52;
    const tipY = Math.sin(swordAngle) * 52;
    ctx.fillStyle = `rgba(255,255,255,${0.8 - slashProgress})`;
    ctx.beginPath();
    ctx.ellipse(tipX, tipY, 4, 4, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  
  ctx.restore();
}

function endRound() {
  if (roundOver) return;
  roundOver = true;
  gameOverTimer = 0;
  
  if (p1.hp <= 0) { p2.wins++; playSFX('ko'); }
  else if (p2.hp <= 0) { p1.wins++; playSFX('ko'); }
  else if (p1.hp > p2.hp) { p1.wins++; }
  else { p2.wins++; }
}

// ============================================================
// FIGHT SCREEN DRAWING
// ============================================================
function drawFight() {
  // Apply screen shake
  ctx.save();
  if (screenShake > 0.5) {
    ctx.translate(
      (Math.random() - 0.5) * screenShake,
      (Math.random() - 0.5) * screenShake
    );
  }
  
  // Background
  drawBackground();
  
  // Draw fighters
  const p1DrawY = p1.y + p1.jumpY;
  const p2DrawY = p2.y + p2.jumpY;
  
  // Shadow under fighters
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(p1.x, p1.y + 62, 25, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(p2.x, p2.y + 62, 25, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  
  // Draw P1
  drawCharacterPortrait(ctx, p1.char, p1.x, p1DrawY, 1.3, {
    facing: p1.facing,
    state: p1.state,
    attackType: p1.attackType,
    animFrame: p1.state === 'attack' ? p1.attackAnimFrame : p1.animFrame,
    breathe: Math.sin(frameCount * 0.05) * 1.5,
    crouching: p1.crouching,
    getupTimer: p1.getupTimer || 0,
    thrown: p1.thrown,
    thrownTimer: p1.thrownTimer || 0
  });
  
  // Draw P2
  drawCharacterPortrait(ctx, p2.char, p2.x, p2DrawY, 1.3, {
    facing: p2.facing,
    state: p2.state,
    attackType: p2.attackType,
    animFrame: p2.state === 'attack' ? p2.attackAnimFrame : p2.animFrame,
    breathe: Math.sin(frameCount * 0.05 + 1) * 1.5,
    crouching: p2.crouching,
    getupTimer: p2.getupTimer || 0,
    thrown: p2.thrown,
    thrownTimer: p2.thrownTimer || 0
  });
  
  // Projectiles (shurikens)
  drawProjectiles();
  
  // Sword slash visual effect
  drawSwordSlashEffect(p1);
  drawSwordSlashEffect(p2);
  
  // Particles
  drawParticles();
  
  ctx.restore();
  
  // HUD (not affected by screen shake)
  drawHealthBars();
  
  // Round start announcement
  if (roundStartTimer > 0) {
    ctx.font = 'bold 48px monospace';
    ctx.textAlign = 'center';
    if (roundStartTimer > 60) {
      ctx.fillStyle = '#ffcc00';
      ctx.fillText('ROUND ' + roundNum, 480, 280);
    } else {
      ctx.fillStyle = '#ff3333';
      ctx.fillText('FIGHT!', 480, 280);
    }
    ctx.textAlign = 'left';
  }
  
  // Round end announcement
  if (roundOver) {
    ctx.font = 'bold 42px monospace';
    ctx.textAlign = 'center';
    if (p1.hp <= 0 || p2.hp <= 0) {
      ctx.fillStyle = '#ff0000';
      ctx.fillText('K.O.!', 480, 250);
    }
    if (gameOverTimer > 60) {
      ctx.fillStyle = '#ffcc00';
      const roundWinner = p1.hp > p2.hp ? CHARS[p1.char].name : CHARS[p2.char].name;
      ctx.font = 'bold 28px monospace';
      ctx.fillText(roundWinner + ' WINS', 480, 300);
    }
    ctx.textAlign = 'left';
  }
  
  // Controls hint
  ctx.font = '10px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillText('Arrows:Move/Jump | A:LowKick S:HighKick D:Punch/Shuriken/Throw F:Punch/Sword/Slam | Space:Block', 90, 535);
}

// ============================================================
// GAME OVER SCREEN
// ============================================================
function drawGameOver() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, W, H);
  
  // Winner display
  const winChar = winner === 'P1' ? p1.char : p2.char;
  
  // Background glow
  ctx.fillStyle = 'rgba(255,200,0,0.05)';
  ctx.beginPath();
  ctx.ellipse(480, 300, 200, 200, 0, 0, Math.PI * 2);
  ctx.fill();
  
  // Draw winner character large
  drawCharacterPortrait(ctx, winChar, 480, 350, 2.5, {
    facing: 1,
    state: 'idle',
    animFrame: frameCount,
    breathe: Math.sin(frameCount * 0.04) * 2
  });
  
  // Winner text
  ctx.font = 'bold 42px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffcc00';
  ctx.fillText(CHARS[winChar].name, 480, 80);
  
  ctx.font = 'bold 32px monospace';
  ctx.fillStyle = '#ff3333';
  ctx.fillText('WINS!', 480, 120);
  
  // Flashing restart text
  if (Math.floor(frameCount / 30) % 2 === 0) {
    ctx.font = '16px monospace';
    ctx.fillStyle = '#ffffff';
    ctx.fillText('PRESS ENTER TO PLAY AGAIN', 480, 510);
  }
  
  ctx.textAlign = 'left';
  
  // Handle restart
  if (keys['Enter'] || keys[' ']) {
    gameState = STATE.SELECT;
    selectConfirmed = false;
    p1.wins = 0;
    p2.wins = 0;
    roundNum = 1;
    startMusic('select');
    keys['Enter'] = false;
    keys[' '] = false;
  }
}

// ============================================================
// MAIN GAME LOOP
// ============================================================
function gameLoop() {
  try {
  frameCount++;
  
  switch (gameState) {
    case STATE.INTRO:
      updateIntro();
      drawIntro();
      break;
    case STATE.SELECT:
      updateSelect();
      drawSelect();
      break;
    case STATE.LEVEL_SELECT:
      updateLevelSelect();
      drawLevelSelect();
      break;
    case STATE.FIGHT:
      updateFight();
      updateFight();
      drawFight();
      break;
    case STATE.GAMEOVER:
      drawGameOver();
      break;
  }
  } catch(err) {
    ctx.fillStyle = '#ff0000';
    ctx.font = '16px monospace';
    ctx.fillText('ERROR: ' + err.message, 10, 30);
    ctx.fillText('at: ' + err.stack.split('\n')[1], 10, 50);
  }
  
  requestAnimationFrame(gameLoop);
}

// Start intro music after first interaction
let introMusicStarted = false;
document.addEventListener('click', () => {
  initAudio();
  if (!introMusicStarted && gameState === STATE.INTRO) {
    startMusic('intro');
    introMusicStarted = true;
  }
});
document.addEventListener('keydown', () => {
  if (!introMusicStarted && gameState === STATE.INTRO) {
    startMusic('intro');
    introMusicStarted = true;
  }
}, { once: false });

// Start the game
gameLoop();
</script>
