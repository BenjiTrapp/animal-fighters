<body>
<canvas id="gc" width="960" height="540"></canvas>
<script>// ============================================================
// ANIMAL FIGHTERS
// Complete Fighting Game with Detailed Character Sprites
// ============================================================

const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const W = 960, H = 540;

// Game States
const STATE = { INTRO: 0, SELECT: 1, LEVEL_SELECT: 4, FIGHT: 2, GAMEOVER: 3 };
let gameState = STATE.INTRO;
let introTimer = 0;
let introPhase = 0;

// Audio Context
let audioCtx = null;
let masterGain = null;
let musicPlaying = false;
let currentTrack = null;

// Characters
const CHARS = [
  { name: 'JUDO PANDA', style: 'Judo', speed: 3, power: 9, defense: 8, hp: 110, color: '#ffffff' },
  { name: 'NINJA RACCOON', style: 'Ninjutsu', speed: 10, power: 7, defense: 5, hp: 90, color: '#708090' },
  { name: 'KARATE DOG', style: 'Karate', speed: 6, power: 8, defense: 7, hp: 100, color: '#DAA520' }
];

// Player/Game state
let p1 = { char: 0, x: 200, y: 380, hp: 100, maxHp: 100, vx: 0, vy: 0, facing: 1, state: 'idle', attackType: '', attackTimer: 0, attackAnimFrame: 0, hitTimer: 0, blockTimer: 0, wins: 0, animFrame: 0, jumpY: 0, crouching: false, comboCount: 0, _hitRegistered: false, thrown: false, thrownTimer: 0 };
let p2 = { char: 1, x: 700, y: 380, hp: 100, maxHp: 100, vx: 0, vy: 0, facing: -1, state: 'idle', attackType: '', attackTimer: 0, attackAnimFrame: 0, hitTimer: 0, blockTimer: 0, wins: 0, animFrame: 0, jumpY: 0, crouching: false, comboCount: 0, _hitRegistered: false, thrown: false, thrownTimer: 0 };

let selectCursor = 0;
let selectConfirmed = false;
let p2Char = 1;

// Levels
const LEVELS = [
  { name: 'CHINA', subtitle: 'Bamboo Forest', mapX: 700, mapY: 175, color: '#cc2222' },
  { name: 'JAPAN', subtitle: 'Sakura Garden', mapX: 783, mapY: 160, color: '#ff69b4' },
  { name: 'EUROPE', subtitle: 'Night Market', mapX: 480, mapY: 125, color: '#3366cc' },
  { name: 'BRAZIL', subtitle: 'Tropical Beach', mapX: 295, mapY: 320, color: '#22aa22' },
  { name: 'EGYPT', subtitle: 'Desert Pyramids', mapX: 520, mapY: 210, color: '#ddaa00' },
  { name: 'USA', subtitle: 'City Rooftop', mapX: 190, mapY: 155, color: '#4488ff' },
  { name: 'MEXICO', subtitle: 'Maya Temple', mapX: 215, mapY: 225, color: '#cc8800' },
  { name: 'AUSTRALIA', subtitle: 'Ayers Rock', mapX: 795, mapY: 360, color: '#dd4400' },
  { name: 'THAILAND', subtitle: 'Golden Temple', mapX: 680, mapY: 235, color: '#ffaa00' },
  { name: 'RUSSIA', subtitle: 'Frozen Tundra', mapX: 620, mapY: 82, color: '#88ccff' },
  { name: '?', subtitle: 'Random Stage', mapX: 480, mapY: 430, color: '#aa44ff' }
];
let levelCursor = 0;
let levelConfirmed = false;
let selectedLevel = 0;

let roundNum = 1;
let roundTimer = 99;
let roundTimerFrame = 0;
let roundStartTimer = 0;
let roundOver = false;
let gameOverTimer = 0;
let winner = '';
let particles = [];
let projectiles = [];
let screenShake = 0;

// Keys
const keys = {};
document.addEventListener('keydown', e => { keys[e.key] = true; if (e.key !== e.key.toLowerCase()) keys[e.key.toLowerCase()] = true; if (e.code) keys[e.code] = true; if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'ArrowDown') e.preventDefault(); if (gameState === STATE.INTRO && introPhase < 3) introPhase = 3; initAudio(); });
document.addEventListener('keyup', e => { keys[e.key] = false; if (e.key !== e.key.toLowerCase()) keys[e.key.toLowerCase()] = false; if (e.code) keys[e.code] = false; });

// ============================================================
// MUSIC ENGINE - MK-Style Dark Aggressive Music
// ============================================================
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.3;
  masterGain.connect(audioCtx.destination);
}

function playNote(freq, duration, type, gain, startTime, detune) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.value = freq;
  if (detune) osc.detune.value = detune;
  g.gain.setValueAtTime(gain || 0.1, startTime);
  g.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.connect(g);
  g.connect(masterGain);
  osc.start(startTime);
  osc.stop(startTime + duration);
}

function playDrum(type, startTime) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  if (type === 'kick') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, startTime);
    osc.frequency.exponentialRampToValueAtTime(30, startTime + 0.15);
    g.gain.setValueAtTime(0.5, startTime);
    g.gain.exponentialRampToValueAtTime(0.001, startTime + 0.2);
  } else if (type === 'snare') {
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(200, startTime);
    osc.frequency.exponentialRampToValueAtTime(50, startTime + 0.1);
    g.gain.setValueAtTime(0.3, startTime);
    g.gain.exponentialRampToValueAtTime(0.001, startTime + 0.15);
    const noise = audioCtx.createOscillator();
    const ng = audioCtx.createGain();
    noise.type = 'sawtooth';
    noise.frequency.value = 3000;
    ng.gain.setValueAtTime(0.15, startTime);
    ng.gain.exponentialRampToValueAtTime(0.001, startTime + 0.1);
    noise.connect(ng); ng.connect(masterGain);
    noise.start(startTime); noise.stop(startTime + 0.1);
  } else if (type === 'hihat') {
    osc.type = 'sawtooth';
    osc.frequency.value = 6000;
    g.gain.setValueAtTime(0.08, startTime);
    g.gain.exponentialRampToValueAtTime(0.001, startTime + 0.05);
  }
  osc.connect(g); g.connect(masterGain);
  osc.start(startTime); osc.stop(startTime + 0.3);
}

function playIntroMusic() {
  if (!audioCtx) return;
  const bpm = 85;
  const beatLen = 60 / bpm;
  const t = audioCtx.currentTime + 0.1;
  const bassNotes = [55, 55, 65.4, 55, 55, 73.4, 55, 82.4];
  for (let i = 0; i < 16; i++) {
    const note = bassNotes[i % bassNotes.length];
    playNote(note, beatLen * 0.8, 'sawtooth', 0.15, t + i * beatLen);
    playDrum('kick', t + i * beatLen);
    if (i % 2 === 1) playDrum('snare', t + i * beatLen);
    playDrum('hihat', t + i * beatLen + beatLen * 0.5);
    if (i % 4 === 0) playNote(note * 4, beatLen * 0.3, 'square', 0.06, t + i * beatLen);
  }
  // Dark melody
  const melody = [220, 196, 165, 147, 165, 196, 220, 262, 220, 196, 165, 147, 131, 147, 165, 196];
  for (let i = 0; i < 16; i++) {
    playNote(melody[i], beatLen * 0.6, 'square', 0.07, t + i * beatLen, -5);
  }
}

function playSelectMusic() {
  if (!audioCtx) return;
  const bpm = 100;
  const beatLen = 60 / bpm;
  const t = audioCtx.currentTime + 0.1;
  const bassLine = [82.4, 82.4, 98, 110, 82.4, 82.4, 73.4, 82.4];
  for (let i = 0; i < 24; i++) {
    const note = bassLine[i % bassLine.length];
    playNote(note, beatLen * 0.5, 'sawtooth', 0.12, t + i * beatLen);
    playDrum('kick', t + i * beatLen);
    if (i % 2 === 1) playDrum('snare', t + i * beatLen);
    playDrum('hihat', t + i * beatLen);
    playDrum('hihat', t + i * beatLen + beatLen * 0.5);
    if (i % 2 === 0) playNote(note * 3, beatLen * 0.2, 'triangle', 0.05, t + i * beatLen + beatLen * 0.25);
  }
  const selMelody = [330, 392, 440, 392, 330, 294, 330, 392, 440, 523, 440, 392, 330, 294, 262, 294];
  for (let i = 0; i < 16; i++) {
    playNote(selMelody[i], beatLen * 0.4, 'square', 0.06, t + i * beatLen * 1.5);
  }
}

function playFightMusic() {
  if (!audioCtx) return;
  const bpm = 140;
  const beatLen = 60 / bpm;
  const t = audioCtx.currentTime + 0.1;
  const bassLine = [110, 110, 130.8, 110, 146.8, 130.8, 110, 98];
  for (let i = 0; i < 32; i++) {
    const note = bassLine[i % bassLine.length];
    playNote(note, beatLen * 0.4, 'sawtooth', 0.13, t + i * beatLen, 3);
    playDrum('kick', t + i * beatLen);
    if (i % 2 === 1) playDrum('snare', t + i * beatLen);
    playDrum('hihat', t + i * beatLen);
    if (i % 4 === 2) playDrum('hihat', t + i * beatLen + beatLen * 0.25);
    // Power chords
    if (i % 4 === 0) {
      playNote(note * 2, beatLen * 0.3, 'sawtooth', 0.08, t + i * beatLen);
      playNote(note * 3, beatLen * 0.3, 'sawtooth', 0.05, t + i * beatLen);
    }
  }
  const fightMelody = [440, 523, 587, 523, 440, 392, 440, 523, 587, 659, 587, 523, 440, 392, 349, 392];
  for (let i = 0; i < 16; i++) {
    playNote(fightMelody[i], beatLen * 0.35, 'square', 0.06, t + (i * 2) * beatLen);
  }
}

let musicInterval = null;
let musicAudio = null;
function startMusic(track) {
  stopMusic();
  if (track === 'intro') {
    musicAudio = new Audio('intro.mp3');
    musicAudio.loop = true;
    musicAudio.volume = 0.7;
    musicAudio.play().catch(() => {});
  } else if (track === 'select') {
    musicAudio = new Audio('fighter_select.mp3');
    musicAudio.loop = true;
    musicAudio.volume = 0.7;
    musicAudio.play().catch(() => {});
  } else if (track === 'fight') {
    musicAudio = new Audio('fight.mp3');
    musicAudio.loop = true;
    musicAudio.volume = 0.7;
    musicAudio.play().catch(() => {});
  }
  currentTrack = track;
}
function stopMusic() {
  if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
  if (musicAudio) { musicAudio.pause(); musicAudio.currentTime = 0; musicAudio = null; }
}

// Sound Effects
function playSFX(type) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  if (type === 'hit') {
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = 'sawtooth'; o.frequency.setValueAtTime(800, t); o.frequency.exponentialRampToValueAtTime(100, t+0.1);
    g.gain.setValueAtTime(0.3, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.12);
    o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.12);
  } else if (type === 'heavyhit') {
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = 'sawtooth'; o.frequency.setValueAtTime(400, t); o.frequency.exponentialRampToValueAtTime(40, t+0.2);
    g.gain.setValueAtTime(0.4, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.25);
    o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.25);
    playDrum('kick', t);
  } else if (type === 'select') {
    playNote(523, 0.1, 'square', 0.15, t); playNote(659, 0.1, 'square', 0.15, t+0.08);
  } else if (type === 'confirm') {
    playNote(523, 0.08, 'square', 0.12, t); playNote(659, 0.08, 'square', 0.12, t+0.06);
    playNote(784, 0.15, 'square', 0.12, t+0.12);
  } else if (type === 'ko') {
    for (let i = 0; i < 6; i++) playNote(200 + i * 50, 0.3, 'sawtooth', 0.12 - i*0.015, t + i*0.12);
    playDrum('kick', t); playDrum('snare', t+0.2); playDrum('kick', t+0.4);
  } else if (type === 'slam') {
    // Ground slam impact sound
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = 'sawtooth'; o.frequency.setValueAtTime(120, t); o.frequency.exponentialRampToValueAtTime(30, t+0.3);
    g.gain.setValueAtTime(0.5, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.35);
    o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.35);
    playDrum('kick', t); playDrum('kick', t+0.05); playDrum('snare', t+0.1);
  } else if (type === 'round') {
    playNote(392, 0.15, 'square', 0.12, t); playNote(523, 0.2, 'square', 0.12, t+0.15);
  } else if (type === 'block') {
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = 'triangle'; o.frequency.value = 300;
    g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.08);
    o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.08);
  }
}

// ============================================================
// DETAILED CHARACTER PORTRAIT DRAWING FUNCTION
// ============================================================
function drawCharacterPortrait(ctx, charIdx, x, y, scale, options) {
  const opt = options || {};
  const facing = opt.facing || 1;
  const state = opt.state || 'idle';
  const attackType = opt.attackType || '';
  const animFrame = opt.animFrame || 0;
  const breathe = opt.breathe !== undefined ? opt.breathe : Math.sin(frameCount * 0.05) * 2;
  const isCrouching = opt.crouching || false;
  
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(facing * scale, scale);
  
  // Animation offsets
  let bodyOffY = breathe;
  let armLAngle = 0, armRAngle = 0;
  let legLAngle = 0, legRAngle = 0;
  let headTilt = 0;
  let crouchSquish = isCrouching ? 0.7 : 1;
  
  if (state === 'idle') {
    armLAngle = Math.sin(animFrame * 0.08) * 0.1 - 0.3;
    armRAngle = Math.sin(animFrame * 0.08 + 1) * 0.1 + 0.3;
    legLAngle = Math.sin(animFrame * 0.06) * 0.05;
    legRAngle = -Math.sin(animFrame * 0.06) * 0.05;
  } else if (state === 'walk') {
    armLAngle = Math.sin(animFrame * 0.2) * 0.5;
    armRAngle = -Math.sin(animFrame * 0.2) * 0.5;
    legLAngle = Math.sin(animFrame * 0.2) * 0.4;
    legRAngle = -Math.sin(animFrame * 0.2) * 0.4;
    bodyOffY += Math.abs(Math.sin(animFrame * 0.2)) * 2;
  } else if (state === 'attack') {
    if (attackType === 'lowpunch' || attackType === 'highpunch') {
      armRAngle = 1.2 - Math.min(1, animFrame * 0.15) * 2.5;
      bodyOffY -= 3;
    } else if (attackType === 'lowkick') {
      legRAngle = 0.3 - Math.min(1, animFrame * 0.12) * 1.8;
      bodyOffY -= 2;
    } else if (attackType === 'highkick') {
      legRAngle = 0.5 - Math.min(1, animFrame * 0.12) * 2.5;
      bodyOffY -= 5;
      armLAngle = -0.5;
    } else if (attackType === 'judothrow') {
      // Judo throw: crouch, reach forward with both arms, then lift
      const f = Math.min(1, animFrame * 0.08);
      if (f < 0.4) {
        // Reach forward (grab phase)
        armLAngle = -0.3 - f * 3;
        armRAngle = -0.3 - f * 3;
        bodyOffY += 8;
        legLAngle = 0.4;
        legRAngle = 0.4;
      } else {
        // Lift and flip (throw phase)
        const t = (f - 0.4) / 0.6;
        armLAngle = -1.5 + t * 3.5;
        armRAngle = -1.5 + t * 3.5;
        bodyOffY -= t * 12;
        headTilt = -0.2;
        legLAngle = -0.3 * t;
        legRAngle = 0.2;
      }
    } else if (attackType === 'shoulderslam') {
      // Shoulder slam: lean forward, drive with shoulder
      const f = Math.min(1, animFrame * 0.1);
      bodyOffY += 5 - f * 10;
      headTilt = 0.3 - f * 0.4;
      armLAngle = 0.8 - f * 1.5;
      armRAngle = 0.8 - f * 1.5;
      legLAngle = -0.5 * f;
      legRAngle = 0.6 * (1 - f);
    } else if (attackType === 'shuriken') {
      // Shuriken throw: wind up then release
      const f = Math.min(1, animFrame * 0.12);
      if (f < 0.4) {
        // Wind up - arm pulled back
        armRAngle = 0.8 + f * 2;
        armLAngle = -0.3;
        bodyOffY -= 2;
      } else {
        // Throw - arm snaps forward
        const t = (f - 0.4) / 0.6;
        armRAngle = 1.6 - t * 3.5;
        armLAngle = -0.3 + t * 0.5;
        bodyOffY -= 4;
        headTilt = -0.1;
      }
    } else if (attackType === 'swordslash') {
      // Sword slash: overhead to diagonal slash
      const f = Math.min(1, animFrame * 0.1);
      if (f < 0.3) {
        // Raise sword overhead
        armRAngle = -0.5 - f * 4;
        armLAngle = -0.3;
        bodyOffY -= 5;
        legLAngle = -0.2;
      } else {
        // Slash downward
        const t = (f - 0.3) / 0.7;
        armRAngle = -1.7 + t * 3.5;
        armLAngle = -0.3 + t * 0.8;
        bodyOffY -= 5 + t * 3;
        headTilt = -0.1 + t * 0.2;
        legLAngle = -0.2 + t * 0.4;
        legRAngle = -t * 0.3;
      }
    }
  } else if (state === 'hit') {
    if (opt.thrown) {
      // Spinning in the air from judo throw
      const spin = opt.thrownTimer * 0.35;
      ctx.rotate(spin);
      armLAngle = -0.8;
      armRAngle = 0.8;
      legLAngle = -0.5;
      legRAngle = 0.5;
    } else {
      bodyOffY += 3;
      headTilt = 0.15;
      armLAngle = 0.3;
      armRAngle = 0.5;
    }
  } else if (state === 'block') {
    armLAngle = -0.8;
    armRAngle = -0.6;
    bodyOffY += 2;
  } else if (state === 'jump') {
    armLAngle = -0.7;
    armRAngle = -0.7;
    legLAngle = -0.3;
    legRAngle = 0.3;
  } else if (state === 'knockdown') {
    // Lying flat on the ground
    ctx.rotate(Math.PI / 2);
    bodyOffY += 35;
    armLAngle = 0.3;
    armRAngle = 0.3;
    legLAngle = 0.1;
    legRAngle = 0.1;
  } else if (state === 'getup') {
    // Getting up from ground
    const t = 1 - (opt.getupTimer || 0) / 20;
    ctx.rotate((Math.PI / 2) * (1 - t));
    bodyOffY += 35 * (1 - t);
    armLAngle = -0.5 * t;
    armRAngle = -0.5 * t;
    legLAngle = 0.4 * (1 - t);
    legRAngle = 0.4 * (1 - t);
  } else if (state === 'ko') {
    ctx.rotate(Math.PI / 2 * Math.min(1, animFrame * 0.05));
    bodyOffY += animFrame * 0.5;
  }
  
  if (isCrouching) {
    bodyOffY += 15;
    legLAngle = 0.8;
    legRAngle = 0.8;
    armLAngle -= 0.2;
    armRAngle += 0.2;
  }

  // Draw based on character
  if (charIdx === 0) drawPanda(ctx, bodyOffY, armLAngle, armRAngle, legLAngle, legRAngle, headTilt, crouchSquish, animFrame, state, attackType);
  else if (charIdx === 1) drawRaccoon(ctx, bodyOffY, armLAngle, armRAngle, legLAngle, legRAngle, headTilt, crouchSquish, animFrame, state, attackType);
  else if (charIdx === 2) drawDog(ctx, bodyOffY, armLAngle, armRAngle, legLAngle, legRAngle, headTilt, crouchSquish, animFrame, state, attackType);
  
  ctx.restore();
}

// ============================================================
// JUDO PANDA - Detailed Drawing
// ============================================================
function drawPanda(ctx, bodyOffY, armLA, armRA, legLA, legRA, headTilt, crouchSquish, animFrame, state, attackType) {
  const by = bodyOffY;
  
  // === BACK LEG (left leg) ===
  ctx.save();
  ctx.translate(-8, 20 + by);
  ctx.rotate(legLA);
  // Gi pants - left leg
  ctx.fillStyle = '#f0f0f0';
  ctx.beginPath();
  ctx.moveTo(-7, 0);
  ctx.lineTo(-9, 20);
  ctx.lineTo(-10, 40);
  ctx.lineTo(6, 40);
  ctx.lineTo(7, 20);
  ctx.lineTo(5, 0);
  ctx.closePath();
  ctx.fill();
  // Pants shading
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.fillRect(-9, 5, 4, 30);
  // Fabric wrinkles
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(-5, 8); ctx.quadraticCurveTo(0, 10, 4, 8);
  ctx.moveTo(-6, 18); ctx.quadraticCurveTo(-1, 20, 4, 17);
  ctx.moveTo(-7, 28); ctx.quadraticCurveTo(-2, 31, 5, 28);
  ctx.stroke();
  // Foot
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.ellipse(-2, 43, 8, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  // Toe pads
  ctx.fillStyle = '#3a3a3a';
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.ellipse(-5 + i * 3, 41, 1.5, 1.2, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
  
  // === FRONT LEG (right leg) ===
  ctx.save();
  ctx.translate(8, 20 + by);
  ctx.rotate(legRA);
  // Gi pants - right leg
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.moveTo(-6, 0);
  ctx.lineTo(-8, 20);
  ctx.lineTo(-9, 40);
  ctx.lineTo(7, 40);
  ctx.lineTo(8, 20);
  ctx.lineTo(6, 0);
  ctx.closePath();
  ctx.fill();
  // Pants highlight
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillRect(2, 5, 4, 30);
  // Pants shadow
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  ctx.fillRect(-8, 5, 4, 30);
  // Fabric wrinkles
  ctx.strokeStyle = 'rgba(0,0,0,0.12)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(-4, 10); ctx.quadraticCurveTo(1, 12, 5, 10);
  ctx.moveTo(-5, 22); ctx.quadraticCurveTo(0, 24, 5, 21);
  ctx.moveTo(-6, 33); ctx.quadraticCurveTo(-1, 35, 5, 32);

    fGrad.addColorStop(0.4, 'rgba(255,100,0,0.6)');
    fGrad.addColorStop(1, 'rgba(200,0,0,0)');
    ctx.fillStyle = fGrad;
    ctx.beginPath();
    ctx.ellipse(0, 29, 14, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    // Flame tongues
    for (let i = 0; i < 6; i++) {
      const angle = (i / 6) * Math.PI * 2 + ff;
      const flicker = Math.sin(ff * 4 + i * 2.1) * 3;
      const fx = Math.cos(angle) * (7 + flicker);
      const fy = 29 + Math.sin(angle) * (6 + flicker) - Math.abs(Math.sin(ff * 2 + i)) * 5;
      const fSize = 3 + Math.sin(ff * 3 + i) * 1.5;
      ctx.save();
      ctx.globalAlpha = 0.6 + Math.sin(ff * 5 + i) * 0.2;
      ctx.fillStyle = i % 2 === 0 ? '#ff6600' : '#ffaa00';
      ctx.beginPath();
      ctx.ellipse(fx, fy, fSize, fSize * 1.5, angle, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    // Inner bright core
    ctx.save();
    ctx.globalAlpha = 0.7 + Math.sin(ff * 6) * 0.15;
    ctx.fillStyle = '#ffe060';
    ctx.beginPath();
    ctx.ellipse(0, 30, 5, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  } else {
    ctx.beginPath();
    ctx.ellipse(0, 31, 6, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#e8c050';
    ctx.beginPath();
    ctx.ellipse(0, 32, 3.5, 2.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(100,60,10,0.2)';
    ctx.lineWidth = 0.4;
    for (let i = 0; i < 4; i++) {
      ctx.beginPath();
      ctx.moveTo(-4 + i * 2.5, 29);
      ctx.lineTo(-4 + i * 2.5, 33);
      ctx.stroke();
    }
  }
  ctx.restore();
  
  // === HEAD ===
  ctx.save();
  ctx.translate(0, -34 + by);
  ctx.rotate(headTilt);
  // Neck with golden fur
  ctx.fillStyle = '#c8943c';
  ctx.fillRect(-6, 7, 12, 9);
  ctx.fillStyle = '#daa520';
  ctx.fillRect(-4, 8, 8, 7);
  // Head - round with slight muzzle
  ctx.fillStyle = '#daa520';
  ctx.beginPath();
  ctx.ellipse(0, -4, 17, 15, 0, 0, Math.PI * 2);
  ctx.fill();
  // Head highlight
  ctx.fillStyle = 'rgba(255,255,200,0.15)';
  ctx.beginPath();
  ctx.ellipse(-5, -10, 8, 6, -0.2, 0, Math.PI * 2);
  ctx.fill();
  // Head shadow
  ctx.fillStyle = 'rgba(150,90,20,0.15)';
  ctx.beginPath();
  ctx.ellipse(5, 4, 10, 8, 0.3, 0, Math.PI * 2);
  ctx.fill();
  // Lighter muzzle area
  ctx.fillStyle = '#f0d880';
  ctx.beginPath();
  ctx.ellipse(0, 3, 9, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  // Even lighter center muzzle
  ctx.fillStyle = '#f8e8a0';
  ctx.beginPath();
  ctx.ellipse(0, 4, 6, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  // FLOPPY EARS (bounce during animation)
  const earBounce = Math.sin(animFrame * 0.15) * 2;
  // Left ear
  ctx.fillStyle = '#c8943c';
  ctx.beginPath();
  ctx.moveTo(-12, -8);
  ctx.quadraticCurveTo(-18, -4, -19, 4 + earBounce);
  ctx.quadraticCurveTo(-17, 8 + earBounce, -13, 2 + earBounce * 0.5);
  ctx.quadraticCurveTo(-11, -2, -10, -6);
  ctx.closePath();
  ctx.fill();
  // Left ear inner
  ctx.fillStyle = '#b07828';
  ctx.beginPath();
  ctx.moveTo(-12, -5);
  ctx.quadraticCurveTo(-16, -1, -16, 3 + earBounce);
  ctx.quadraticCurveTo(-14, 5 + earBounce, -12, 1 + earBounce * 0.5);
  ctx.closePath();
  ctx.fill();
  // Right ear
  ctx.fillStyle = '#c8943c';
  ctx.beginPath();
  ctx.moveTo(12, -8);
  ctx.quadraticCurveTo(18, -4, 19, 4 + earBounce);
  ctx.quadraticCurveTo(17, 8 + earBounce, 13, 2 + earBounce * 0.5);
  ctx.quadraticCurveTo(11, -2, 10, -6);
  ctx.closePath();
  ctx.fill();
  // Right ear inner
  ctx.fillStyle = '#b07828';
  ctx.beginPath();
  ctx.moveTo(12, -5);
  ctx.quadraticCurveTo(16, -1, 16, 3 + earBounce);
  ctx.quadraticCurveTo(14, 5 + earBounce, 12, 1 + earBounce * 0.5);
  ctx.closePath();
  ctx.fill();
  // EYES (expressive brown)
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.ellipse(-6, -4, 4, 4.5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(6, -4, 4, 4.5, 0, 0, Math.PI * 2);
  ctx.fill();
  // Iris (brown)
  ctx.fillStyle = '#5c3010';
  ctx.beginPath();
  ctx.ellipse(-6, -3.5, 2.8, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(6, -3.5, 2.8, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  // Pupils
  ctx.fillStyle = '#1a0a00';
  ctx.beginPath();
  ctx.ellipse(-6, -3.5, 1.5, 1.8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(6, -3.5, 1.5, 1.8, 0, 0, Math.PI * 2);
  ctx.fill();
  // Eye highlights
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.ellipse(-5, -5, 1.2, 1, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(7, -5, 1.2, 1, 0, 0, Math.PI * 2);
  ctx.fill();
  // Eyebrows (fur ridges)
  ctx.strokeStyle = '#a07020';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-10, -8); ctx.quadraticCurveTo(-6, -10, -3, -8);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(3, -8); ctx.quadraticCurveTo(6, -10, 10, -8);
  ctx.stroke();
  // NOSE (black, prominent)
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.ellipse(0, 3, 3.5, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();
  // Nose highlight
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath();
  ctx.ellipse(-0.8, 2.2, 1.5, 1, 0, 0, Math.PI * 2);
  ctx.fill();
  // Mouth/tongue (visible when idle)
  if (state === 'idle') {
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(-4, 6);
    ctx.quadraticCurveTo(0, 9, 4, 6);
    ctx.stroke();
    // Tongue
    ctx.fillStyle = '#e05555';
    ctx.beginPath();
    ctx.ellipse(1, 8, 2.5, 2, 0.1, 0, Math.PI);
    ctx.fill();
    // Tongue center line
    ctx.strokeStyle = '#c04040';
    ctx.lineWidth = 0.4;
    ctx.beginPath();
    ctx.moveTo(1, 7); ctx.lineTo(1, 10);
    ctx.stroke();
  } else {
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(-3, 6);
    ctx.quadraticCurveTo(0, 7, 3, 6);
    ctx.stroke();
  }
  // HEADBAND (Red with white rising sun)
  ctx.fillStyle = '#cc2222';
  ctx.beginPath();
  ctx.moveTo(-17, -12);
  ctx.quadraticCurveTo(0, -15, 17, -12);
  ctx.lineTo(17, -9);
  ctx.quadraticCurveTo(0, -12, -17, -9);
  ctx.closePath();
  ctx.fill();
  // Rising sun circle (white)
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.ellipse(0, -11, 3, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();
  // Sun rays (subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 0.4;
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(Math.cos(angle) * 3, -11 + Math.sin(angle) * 2.5);
    ctx.lineTo(Math.cos(angle) * 4.5, -11 + Math.sin(angle) * 3.5);
    ctx.stroke();
  }
  // Headband tails
  const htFlow = Math.sin(animFrame * 0.1) * 2;
  ctx.fillStyle = '#cc2222';
  ctx.beginPath();
  ctx.moveTo(-17, -11);
  ctx.quadraticCurveTo(-22, -10 + htFlow, -26, -8 + htFlow * 1.2);
  ctx.lineTo(-26, -10 + htFlow * 1.2);
  ctx.quadraticCurveTo(-22, -12 + htFlow, -17, -13);
  ctx.closePath();
  ctx.fill();
  
  ctx.restore();
}

// ============================================================
// BACKGROUNDS - Level Stages
// ============================================================
function drawBackground() {
  drawLevelBackground(selectedLevel);
}

function drawLevelBackground(levelIdx) {
  switch (levelIdx) {
    case 0: drawBgChina(); break;
    case 1: drawBgJapan(); break;
    case 2: drawBgEurope(); break;
    case 3: drawBgBrazil(); break;
    case 4: drawBgEgypt(); break;
    case 5: drawBgUSA(); break;
    case 6: drawBgMexico(); break;
    case 7: drawBgAustralia(); break;
    case 8: drawBgThailand(); break;
    case 9: drawBgRussia(); break;
    default: drawBgEurope(); break;
  }
}

// --- CHINA: Bamboo Forest ---
function drawBgChina() {
  // Misty green sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, 350);
  skyGrad.addColorStop(0, '#1a3a2a');
  skyGrad.addColorStop(0.4, '#2a5a3a');
  skyGrad.addColorStop(0.7, '#4a7a4a');
  skyGrad.addColorStop(1, '#8ab870');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, 350);
  
  // Fog/mist layers
  ctx.fillStyle = 'rgba(200,230,200,0.08)';
  for (let i = 0; i < 6; i++) {
    ctx.beginPath();
    ctx.ellipse(160 + i * 160 + Math.sin(frameCount * 0.002 + i) * 30, 180 + i * 20, 120, 30, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // Distant mountains
  ctx.fillStyle = '#1a4030';
  ctx.beginPath();
  ctx.moveTo(0, 250);
  ctx.lineTo(100, 150); ctx.lineTo(200, 210); ctx.lineTo(350, 130);
  ctx.lineTo(500, 200); ctx.lineTo(650, 140); ctx.lineTo(800, 190);
  ctx.lineTo(960, 160); ctx.lineTo(960, 350); ctx.lineTo(0, 350);
  ctx.closePath();
  ctx.fill();
  
  // Bamboo stalks (background layer)
  for (let i = 0; i < 25; i++) {
    const bx = i * 40 + Math.sin(i * 2.5) * 15;
    const bHeight = 250 + Math.sin(i * 1.7) * 60;
    const sway = Math.sin(frameCount * 0.01 + i * 0.8) * 2;
    drawBambooStalk(bx + sway, 380 - bHeight, bHeight, 0.6 + (i % 3) * 0.1);
  }
  
  // Ground
  ctx.fillStyle = '#1a2a1a';
  ctx.fillRect(0, 340, W, 200);
  
  // Ground moss/grass texture
  ctx.fillStyle = 'rgba(80,140,60,0.15)';
  for (let x = 0; x < W; x += 20) {
    for (let y = 340; y < 540; y += 25) {
      ctx.beginPath();
      ctx.ellipse(x + Math.sin(y) * 5, y, 10, 3, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  
  // Stone path
  ctx.fillStyle = 'rgba(100,90,70,0.3)';
  for (let x = 100; x < W - 100; x += 55) {
    ctx.beginPath();
    ctx.ellipse(x + Math.sin(x * 0.1) * 10, 420, 22, 8, Math.sin(x) * 0.3, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // Foreground bamboo (closer, larger)
  for (let i = 0; i < 4; i++) {
    const bx = i === 0 ? -10 : i === 1 ? 30 : i === 2 ? 900 : 940;
    const sway = Math.sin(frameCount * 0.008 + i * 1.5) * 3;
    drawBambooStalk(bx + sway, 50, 500, 1.2);
  }
  
  // Floating leaves (more, with rotation)
  for (let i = 0; i < 15; i++) {
    const speed = 0.2 + (i % 4) * 0.1;
    const lx = (frameCount * speed + i * 75) % (W + 80) - 40;
    const ly = 80 + i * 30 + Math.sin(frameCount * 0.015 + i * 2) * 25;
    const leafSize = 4 + (i % 3) * 2;
    ctx.fillStyle = i % 2 === 0 ? 'rgba(100,180,60,0.5)' : 'rgba(80,150,40,0.4)';
    ctx.save();
    ctx.translate(lx, ly);
    ctx.rotate(frameCount * 0.015 + i * 1.3);
    ctx.beginPath();
    ctx.ellipse(0, 0, leafSize, leafSize * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  
  // Animated mist rolling through
  for (let i = 0; i < 4; i++) {
    const mistX = (frameCount * 0.15 + i * 280) % (W + 300) - 150;
    const mistY = 200 + i * 40 + Math.sin(frameCount * 0.003 + i) * 10;
    const alpha = 0.06 + Math.sin(frameCount * 0.005 + i * 2) * 0.03;
    ctx.fillStyle = `rgba(200,240,200,${alpha})`;
    ctx.beginPath();
    ctx.ellipse(mistX, mistY, 100, 20, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // Crane bird flying
  const craneX = (frameCount * 0.4 + 500) % (W + 300) - 150;
  const craneY = 120 + Math.sin(frameCount * 0.012) * 25;
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 1.5;
  const wingUp = Math.sin(frameCount * 0.08) * 8;
  ctx.beginPath();
  ctx.moveTo(craneX - 10, craneY + wingUp);
  ctx.quadraticCurveTo(craneX, craneY - 2, craneX + 10, craneY + wingUp);
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath();
  ctx.ellipse(craneX, craneY, 4, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawBambooStalk(x, y, height, thickness) {
  const segments = Math.floor(height / 35);
  const w = 6 * thickness;
  
  for (let s = 0; s < segments; s++) {
    const sy = y + s * 35;
    // Segment
    const grad = ctx.createLinearGradient(x - w, sy, x + w, sy);
    grad.addColorStop(0, '#3a6830');
    grad.addColorStop(0.3, '#5a9848');
    grad.addColorStop(0.7, '#4a8838');
    grad.addColorStop(1, '#2a5820');
    ctx.fillStyle = grad;
    ctx.fillRect(x - w/2, sy, w, 33);
    // Node ring
    ctx.fillStyle = '#2a5020';
    ctx.fillRect(x - w/2 - 1, sy + 32, w + 2, 3);
  }
  
  // Leaves at top
  ctx.fillStyle = '#4a9838';
  for (let l = 0; l < 3; l++) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(-0.5 + l * 0.5 + Math.sin(frameCount * 0.015) * 0.1);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(15, -10, 30, -5);
    ctx.quadraticCurveTo(15, 0, 0, 0);
    ctx.fill();
    ctx.restore();
  }
}

// --- JAPAN: Sakura Garden ---
function drawBgJapan() {
  // Soft pink/blue sky
  const skyGrad = ctx.createLinearGradient(0, 0, 0, 350);
  skyGrad.addColorStop(0, '#87ceeb');
  skyGrad.addColorStop(0.4, '#b0d4f1');
  skyGrad.addColorStop(0.7, '#f8c8dc');
  skyGrad.addColorStop(1, '#ffe4e8');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, 350);
  
  // Soft drifting clouds
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  for (let i = 0; i < 5; i++) {
    const cx = (120 + i * 220 + frameCount * 0.08) % (W + 200) - 100;
    ctx.beginPath();
    ctx.ellipse(cx, 60 + i * 12, 70, 20, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + 25, 52 + i * 12, 50, 16, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // Distant mountains
  ctx.fillStyle = 'rgba(140,120,160,0.25)';
  ctx.beginPath();
  ctx.moveTo(0, 280); ctx.lineTo(80, 200); ctx.lineTo(180, 240);
  ctx.lineTo(300, 180); ctx.lineTo(420, 230); ctx.lineTo(550, 190);
  ctx.lineTo(700, 220); ctx.lineTo(850, 195); ctx.lineTo(960, 250);
  ctx.lineTo(960, 350); ctx.lineTo(0, 350);
  ctx.closePath();
  ctx.fill();
  
  // Distant temple silhouette
  ctx.fillStyle = 'rgba(80,60,80,0.3)';
  ctx.fillRect(800, 210, 50, 70);
  ctx.beginPath();
  ctx.moveTo(790, 210); ctx.lineTo(825, 182); ctx.lineTo(860, 210);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(798, 186); ctx.lineTo(825, 162); ctx.lineTo(852, 186);
  ctx.closePath();
  ctx.fill();
  
  // Torii gate (background)
  ctx.fillStyle = 'rgba(180,40,40,0.35)';
  ctx.fillRect(680, 235, 8, 65);
  ctx.fillRect(720, 235, 8, 65);
  ctx.fillRect(675, 230, 58, 8);
  ctx.fillRect(678, 248, 52, 5);
  
  // Ground - soft earth/grass
  const groundGrad = ctx.createLinearGradient(0, 330, 0, 540);
  groundGrad.addColorStop(0, '#5a8050');
  groundGrad.addColorStop(0.3, '#4a6840');
  groundGrad.addColorStop(1, '#3a5030');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, 340, W, 200);
  
  // Stone path (animated subtle shimmer)
  for (let x = 150; x < 810; x += 42) {
    const shimmer = Math.sin(frameCount * 0.02 + x * 0.1) * 0.05;
    ctx.fillStyle = `rgba(160,150,140,${0.4 + shimmer})`;
    ctx.beginPath();
    ctx.ellipse(x, 430, 18, 7, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // Grass blades (animated wind)
  ctx.strokeStyle = 'rgba(80,160,60,0.35)';
  ctx.lineWidth = 1;
  const windOffset = Math.sin(frameCount * 0.015) * 3;
  for (let x = 0; x < W; x += 12) {
    const gh = 8 + Math.sin(x * 0.3) * 4;
    ctx.beginPath();
    ctx.moveTo(x, 345);
    ctx.quadraticCurveTo(x + windOffset + Math.sin(frameCount * 0.025 + x * 0.1) * 2, 345 - gh, x + windOffset + 3, 345 - gh);
    ctx.stroke();
  }
  
  // === LARGE SAKURA TREE (center, dominant) ===
  drawLargeSakuraTree(480, 345);
  
  // Smaller sakura trees on sides
  drawSakuraTree(80, 342, 0.6);
  drawSakuraTree(880, 340, 0.55);
  
  // === FALLING BLOSSOMS (many, varied sizes and speeds) ===
  for (let i = 0; i < 50; i++) {
    // Each petal has unique path using sin/cos with different phases
    const speed = 0.15 + (i % 5) * 0.08;
    const drift = Math.sin(i * 1.7) * 0.6;
    const px = (frameCount * drift + i * 52 + Math.sin(frameCount * 0.008 + i * 0.5) * 80) % (W + 120) - 60;
    const py = (frameCount * speed + i * 43) % (H + 80) - 40;
    const size = 2.5 + (i % 4) * 1.2;
    const rot = frameCount * 0.012 + i * 2.1;
    const flutter = Math.sin(frameCount * 0.04 + i * 1.3) * 0.5;
    
    // Petal color variation
    const pinkVar = i % 3;
    const colors = ['rgba(255,180,200,0.75)', 'rgba(255,200,215,0.7)', 'rgba(255,160,185,0.65)'];
    ctx.fillStyle = colors[pinkVar];
    
    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(rot + flutter);
    // Draw petal shape (heart-like)
    ctx.beginPath();
    ctx.moveTo(0, -size);
    ctx.quadraticCurveTo(size, -size * 0.5, size * 0.6, size * 0.3);
    ctx.quadraticCurveTo(0, size, 0, size * 0.5);
    ctx.quadraticCurveTo(0, size, -size * 0.6, size * 0.3);
    ctx.quadraticCurveTo(-size, -size * 0.5, 0, -size);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
  
  // Ground petals (accumulated on ground)
  ctx.fillStyle = 'rgba(255,190,210,0.4)';
  for (let i = 0; i < 30; i++) {
    const gx = (i * 67 + 30) % W;
    const gy = 350 + (i * 23) % 50;
    ctx.beginPath();
    ctx.ellipse(gx, gy, 3, 1.5, i * 0.8, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawLargeSakuraTree(x, y) {
  ctx.save();
  ctx.translate(x, y);
  
  // Large thick trunk
  ctx.fillStyle = '#3a2520';
  ctx.beginPath();
  ctx.moveTo(-20, 0); ctx.lineTo(-18, -40);
  ctx.quadraticCurveTo(-22, -80, -15, -120);
  ctx.quadraticCurveTo(-10, -160, -5, -190);
  ctx.quadraticCurveTo(0, -200, 5, -190);
  ctx.quadraticCurveTo(10, -160, 15, -120);
  ctx.quadraticCurveTo(22, -80, 18, -40);
  ctx.lineTo(20, 0);
  ctx.closePath();
  ctx.fill();
  
  // Trunk texture/bark
  ctx.strokeStyle = 'rgba(20,10,5,0.3)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 8; i++) {
    ctx.beginPath();
    ctx.moveTo(-10 + i * 3, 0);
    ctx.quadraticCurveTo(-12 + i * 3 + Math.sin(i) * 3, -100, -8 + i * 2, -180);
    ctx.stroke();
  }
  
  // Major branches
  ctx.strokeStyle = '#3a2520';
  ctx.lineWidth = 7;
  // Left branches
  ctx.beginPath();
  ctx.moveTo(-8, -130); ctx.quadraticCurveTo(-60, -160, -110, -145);
  ctx.stroke();
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(-5, -155); ctx.quadraticCurveTo(-50, -190, -90, -185);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-40, -148); ctx.quadraticCurveTo(-70, -180, -130, -170);
  ctx.stroke();
  // Right branches
  ctx.lineWidth = 7;
  ctx.beginPath();

  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(5, -160); ctx.quadraticCurveTo(55, -195, 100, -182);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(45, -145); ctx.quadraticCurveTo(80, -175, 140, -160);
  ctx.stroke();
  // Top branches
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(0, -185); ctx.quadraticCurveTo(-15, -220, -35, -230);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(0, -185); ctx.quadraticCurveTo(20, -225, 40, -228);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(0, -190); ctx.quadraticCurveTo(5, -235, 0, -245);
  ctx.stroke();
  
  // Smaller sub-branches
  ctx.lineWidth = 2;
  ctx.strokeStyle = '#4a3530';
  const subBranches = [
    [-110, -145, -140, -130], [-90, -185, -120, -195],
    [-130, -170, -155, -155], [120, -140, 150, -125],
    [100, -182, 130, -190], [140, -160, 165, -148],
    [-35, -230, -55, -240], [40, -228, 60, -235], [0, -245, 5, -260]
  ];
  for (const [sx, sy, ex, ey] of subBranches) {
    ctx.beginPath();
    ctx.moveTo(sx, sy); ctx.lineTo(ex, ey);
    ctx.stroke();
  }
  
  // Blossom clusters (large, lush canopy)
  const blossomClusters = [
    // Left side
    [-110, -150, 28], [-90, -190, 25], [-130, -175, 22],
    [-70, -160, 24], [-55, -185, 20], [-140, -135, 18],
    [-155, -158, 16], [-120, -198, 18], [-85, -145, 20],
    // Right side
    [120, -145, 28], [100, -187, 25], [140, -165, 22],
    [75, -155, 24], [60, -180, 20], [150, -128, 18],
    [165, -152, 16], [130, -193, 18], [90, -140, 20],
    // Top
    [-35, -235, 22], [40, -232, 22], [0, -250, 20],
    [-55, -243, 16], [60, -238, 16], [0, -260, 14],
    // Fill gaps
    [-20, -200, 22], [20, -200, 22], [0, -210, 18],
    [-45, -165, 18], [50, -162, 18]
  ];
  
  const breathe = Math.sin(frameCount * 0.02) * 1.5;
  
  for (const [bx, by, size] of blossomClusters) {
    const s = size + breathe;
    // Outer glow
    ctx.fillStyle = 'rgba(255,180,200,0.2)';
    ctx.beginPath();
    ctx.ellipse(bx, by, s + 5, s * 0.8 + 4, 0, 0, Math.PI * 2);
    ctx.fill();
    // Main blossom cluster
    ctx.fillStyle = '#ffb0c8';
    ctx.beginPath();
    ctx.ellipse(bx, by, s, s * 0.75, 0, 0, Math.PI * 2);
    ctx.fill();
    // Inner detail - smaller circles for texture
    ctx.fillStyle = '#ffc8d8';
    ctx.beginPath();
    ctx.ellipse(bx - s * 0.2, by - s * 0.15, s * 0.5, s * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
    // Highlight
    ctx.fillStyle = 'rgba(255,230,240,0.4)';
    ctx.beginPath();
    ctx.ellipse(bx - s * 0.15, by - s * 0.2, s * 0.35, s * 0.25, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  
  ctx.restore();
}

function drawSakuraTree(x, y, scale) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  
  // Trunk
  ctx.fillStyle = '#4a3028';
  ctx.beginPath();
  ctx.moveTo(-12, 0); ctx.lineTo(-8, -120);
  ctx.quadraticCurveTo(-5, -140, 0, -150);
  ctx.quadraticCurveTo(5, -140, 8, -120);
  ctx.lineTo(12, 0);
  ctx.closePath();
  ctx.fill();
  
  // Branches
  ctx.strokeStyle = '#3a2520';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(-3, -100); ctx.quadraticCurveTo(-40, -130, -70, -120);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(3, -110); ctx.quadraticCurveTo(50, -140, 80, -125);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(0, -130); ctx.quadraticCurveTo(-20, -170, -40, -175);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(0, -130); ctx.quadraticCurveTo(30, -175, 50, -170);
  ctx.stroke();
  
  // Sakura blossoms
  const blossomPositions = [
    [-70, -125], [-50, -135], [-30, -150], [-45, -170],
    [80, -130], [60, -140], [40, -155], [50, -175],
    [0, -165], [-20, -180], [20, -180], [0, -190],
    [-60, -110], [70, -115], [-30, -120], [30, -125]
  ];
  
  const breathe = Math.sin(frameCount * 0.025) * 1;
  for (const [bx, by] of blossomPositions) {
    ctx.fillStyle = 'rgba(255,180,200,0.3)';
    ctx.beginPath();
    ctx.ellipse(bx, by, 18 + breathe, 14 + breathe, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffb0c8';
    ctx.beginPath();
    ctx.ellipse(bx, by, 13, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,220,230,0.5)';
    ctx.beginPath();
    ctx.ellipse(bx - 3, by - 3, 7, 5, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  
  ctx.restore();
}

function drawLantern(x, y) {
  const glow = Math.sin(frameCount * 0.05 + x) * 0.2 + 0.8;
  // Glow
  ctx.fillStyle = `rgba(255,100,0,${0.1 * glow})`;
  ctx.beginPath();
  ctx.ellipse(x, y, 15, 15, 0, 0, Math.PI * 2);
  ctx.fill();
  // String
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(x, y - 12); ctx.lineTo(x, y - 20);
  ctx.stroke();
  // Lantern body
  ctx.fillStyle = `rgba(255,50,0,${0.7 * glow})`;
  ctx.beginPath();
  ctx.ellipse(x, y, 6, 9, 0, 0, Math.PI * 2);
  ctx.fill();
  // Lantern highlight
  ctx.fillStyle = `rgba(255,200,100,${0.3 * glow})`;
  ctx.beginPath();
  ctx.ellipse(x - 1, y - 2, 3, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  // Top/bottom caps
  ctx.fillStyle = '#8b4513';
  ctx.fillRect(x - 3, y - 9, 6, 2);
  ctx.fillRect(x - 2, y + 7, 4, 2);
}

function drawCrowdNPC(x, y, idx) {
  const colors = ['#445566', '#665544', '#554466', '#446655', '#664455', '#556644'];
  const headColors = ['#deb887', '#d2691e', '#f5deb3', '#bc8f8f', '#daa520', '#cd853f'];
  ctx.fillStyle = colors[idx % colors.length];
  ctx.fillRect(x - 5, y, 10, 18);
  ctx.fillStyle = headColors[idx % headColors.length];
  ctx.beginPath();
  ctx.ellipse(x, y - 3, 5, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  // Simple animation
  const bob = Math.sin(frameCount * 0.03 + idx * 2) * 1;
  ctx.fillStyle = colors[idx % colors.length];
  ctx.fillRect(x - 5, y + bob, 10, 18);
  ctx.fillStyle = headColors[idx % headColors.length];
  ctx.beginPath();
  ctx.ellipse(x, y - 3 + bob, 5, 5, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawPalmTree(x, y, scale) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  
  // Trunk (curved)
  ctx.strokeStyle = '#6b4c2a';
  ctx.lineWidth = 8;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.quadraticCurveTo(10, -80, 5, -180);
  ctx.stroke();
  
  // Trunk texture lines
  ctx.strokeStyle = '#5a3c1a';
  ctx.lineWidth = 1;
  for (let i = 0; i < 8; i++) {
    const ty = -20 - i * 20;
    ctx.beginPath();
    ctx.moveTo(-3 + Math.sin(i) * 2, ty);
    ctx.lineTo(8 + Math.sin(i) * 2, ty);
    ctx.stroke();
  }
  
  // Palm fronds
  const frondColors = ['#228b22', '#2a9a2a', '#1a7a1a', '#33aa33'];
  for (let f = 0; f < 7; f++) {
    const angle = -Math.PI/2 + (f - 3) * 0.45 + Math.sin(frameCount * 0.01 + f) * 0.05;
    ctx.save();
    ctx.translate(5, -178);
    ctx.rotate(angle);
    ctx.fillStyle = frondColors[f % frondColors.length];
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(30, -5, 60, 8);
    ctx.quadraticCurveTo(30, 3, 0, 0);
    ctx.fill();
    // Frond segments
    ctx.strokeStyle = frondColors[f % frondColors.length];
    ctx.lineWidth = 1;
    for (let s = 0; s < 5; s++) {
      ctx.beginPath();
      ctx.moveTo(10 + s * 10, 0);
      ctx.lineTo(15 + s * 10, -6);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(10 + s * 10, 2);
      ctx.lineTo(15 + s * 10, 8);
      ctx.stroke();
    }
    ctx.restore();
  }
  
  // Coconuts
  ctx.fillStyle = '#5a3a1a';
  ctx.beginPath();
  ctx.ellipse(4, -175, 4, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(9, -173, 3.5, 3.5, 0, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.restore();
}

  ctx.moveTo(720, 190); ctx.lineTo(820, 320); ctx.lineTo(720, 320);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();

  ctx.fillStyle = 'rgba(210,170,60,0.3)';
  ctx.beginPath();

  for (let x = 0; x < W; x += 5) {
    ctx.lineTo(x, 370 + Math.sin(x * 0.01 + 1) * 15);
  }
  ctx.lineTo(W, 540); ctx.lineTo(0, 540);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = 'rgba(220,180,80,0.4)';
  for (let i = 0; i < 15; i++) {
    const sx = (frameCount * 0.5 + i * 70) % (W + 50) - 25;

    ctx.beginPath();
    ctx.ellipse(sx, sy, 2, 1, 0, 0, Math.PI * 2);

  }
  
  // Ancient columns (broken)
  drawBrokenColumn(100, 380);

  ctx.strokeStyle = 'rgba(255,200,100,0.08)';

    ctx.beginPath();

  }

function drawBrokenColumn(x, y) {
  // Base
  ctx.fillStyle = '#b0a080';
  ctx.fillRect(x - 10, y, 20, 8);
  // Column
  ctx.fillStyle = '#c8b890';
  ctx.fillRect(x - 7, y - 50, 14, 50);
  // Column lines
  ctx.strokeStyle = 'rgba(100,80,50,0.3)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(x - 5 + i * 3, y - 50);
    ctx.lineTo(x - 5 + i * 3, y);
    ctx.stroke();
  }
  // Broken top (jagged)
  ctx.fillStyle = '#c8b890';
  ctx.beginPath();
  ctx.moveTo(x - 7, y - 50);
  ctx.lineTo(x - 4, y - 58);

// --- MEXICO: Maya Temple ---

  // Thick jungle canopy at top
  ctx.fillStyle = '#1a5020';
  for (let i = 0; i < 12; i++) {
    const tx = i * 85 - 20;
    const sway = Math.sin(frameCount * 0.006 + i * 1.1) * 3;
    ctx.beginPath();
    ctx.ellipse(tx + sway, 30 + Math.sin(i * 2) * 15, 55, 35, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.fillStyle = '#2a6830';
  for (let i = 0; i < 10; i++) {
    const tx = i * 100 + 30;

    ctx.ellipse(tx + sway, 55 + Math.sin(i * 3) * 10, 45, 28, 0, 0, Math.PI * 2);

  }
  
  // Maya pyramid (center, large)
  drawMayaPyramid(480, 320, 1.0);
  
  // Smaller ruined pyramid (left, background)

  drawMayaPyramid(100, 290, 0.45);
  ctx.globalAlpha = 1;
  
  // Jungle vines hanging from top
  ctx.strokeStyle = '#2a5a20';
  ctx.lineWidth = 2;
  for (let i = 0; i < 8; i++) {
    const vx = 50 + i * 125;
    const sway = Math.sin(frameCount * 0.01 + i * 2) * 5;
    ctx.beginPath();
    ctx.moveTo(vx, 0);
    ctx.quadraticCurveTo(vx + sway, 60, vx + sway * 1.5, 90 + Math.sin(i) * 30);
    ctx.stroke();
    // Leaf at end
    ctx.fillStyle = '#3a8030';
    ctx.beginPath();
    ctx.ellipse(vx + sway * 1.5, 92 + Math.sin(i) * 30, 5, 3, sway * 0.1, 0, Math.PI * 2);

  // Ground - mossy stone/jungle floor

  ctx.fillRect(0, 340, W, 200);
  
  // Moss patches
  ctx.fillStyle = 'rgba(50,120,40,0.3)';
  for (let x = 0; x < W; x += 35) {
    ctx.beginPath();
    ctx.ellipse(x + Math.sin(x * 0.2) * 10, 360 + (x * 7) % 40, 15, 5, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // Ancient stone blocks on ground
  ctx.fillStyle = 'rgba(120,110,80,0.4)';
  ctx.fillRect(50, 380, 30, 20);
  ctx.fillRect(820, 390, 35, 18);
  ctx.fillRect(700, 375, 25, 22);
  
  // Animated fireflies
  for (let i = 0; i < 12; i++) {
    const fx = 100 + (i * 83) % (W - 200);
    const fy = 150 + (i * 47) % 200;
    const glow = Math.sin(frameCount * 0.06 + i * 2.5) * 0.4 + 0.5;
    ctx.fillStyle = `rgba(200,255,100,${glow})`;
    ctx.beginPath();
    ctx.ellipse(fx + Math.sin(frameCount * 0.015 + i) * 8, fy + Math.cos(frameCount * 0.012 + i * 1.3) * 6, 2.5, 2.5, 0, 0, Math.PI * 2);
    ctx.fill();
    // Glow
    ctx.fillStyle = `rgba(200,255,100,${glow * 0.2})`;
    ctx.beginPath();
    ctx.ellipse(fx + Math.sin(frameCount * 0.015 + i) * 8, fy + Math.cos(frameCount * 0.012 + i * 1.3) * 6, 6, 6, 0, 0, Math.PI * 2);

function drawMayaPyramid(x, y, scale) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  
  // Pyramid levels (5 tiers)
  const tiers = 5;
  for (let t = 0; t < tiers; t++) {
    const tw = 200 - t * 30;
    const th = 30;
    const ty = -t * 32;
    // Main block
    ctx.fillStyle = `rgb(${150 - t * 10},${130 - t * 8},${80 - t * 5})`;
    ctx.fillRect(-tw/2, ty - th, tw, th);
    // Top edge highlight
    ctx.fillStyle = `rgba(200,180,120,0.3)`;
    ctx.fillRect(-tw/2, ty - th, tw, 4);
    // Stone block lines
    ctx.strokeStyle = 'rgba(60,50,30,0.3)';
    ctx.lineWidth = 0.5;
    for (let bx = -tw/2; bx < tw/2; bx += 20) {
      ctx.beginPath();
      ctx.moveTo(bx, ty - th); ctx.lineTo(bx, ty);
      ctx.stroke();
    }
  }
  
  // Temple on top
  const topW = 50, topH = 35;
  ctx.fillStyle = '#8a7850';
  ctx.fillRect(-topW/2, -tiers * 32 - topH, topW, topH);
  // Door
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(-8, -tiers * 32 - 25, 16, 25);
  // Roof decorations
  ctx.fillStyle = '#6a5840';
  ctx.fillRect(-topW/2 - 3, -tiers * 32 - topH - 5, topW + 6, 5);
  
  // Carved face on pyramid front
  ctx.fillStyle = 'rgba(100,80,50,0.5)';
  ctx.beginPath();
  ctx.ellipse(0, -48, 15, 12, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(30,20,10,0.5)';
  ctx.beginPath();
  ctx.ellipse(-5, -50, 3, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(5, -50, 3, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-5, -44); ctx.lineTo(5, -44); ctx.lineTo(0, -40);
  ctx.closePath();
  ctx.fill();
  
  // Stairs (center)
  ctx.fillStyle = 'rgba(180,160,100,0.4)';
  ctx.fillRect(-12, -tiers * 32, 24, tiers * 32);
  ctx.strokeStyle = 'rgba(60,50,30,0.4)';
  ctx.lineWidth = 0.5;
  for (let s = 0; s < tiers * 4; s++) {
    ctx.beginPath();
    ctx.moveTo(-12, -s * 8); ctx.lineTo(12, -s * 8);
    ctx.stroke();
  }
  
  // Moss/vegetation growing on pyramid
  ctx.fillStyle = 'rgba(60,130,40,0.3)';
  ctx.beginPath();
  ctx.ellipse(-60, -20, 12, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(70, -50, 10, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(-40, -80, 8, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.restore();
}

// --- AUSTRALIA: Ayers Rock ---
function drawBgAustralia() {
  // Outback sky - deep blue to orange horizon
  const skyGrad = ctx.createLinearGradient(0, 0, 0, 280);
  skyGrad.addColorStop(0, '#1a2a5a');
  skyGrad.addColorStop(0.4, '#4a3a6a');
  skyGrad.addColorStop(0.7, '#cc5533');
  skyGrad.addColorStop(1, '#ff8844');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, 300);
  
  // Stars (outback night sky is stunning)
  ctx.fillStyle = '#ffffff';
  for (let i = 0; i < 60; i++) {
    const sx = (i * 97 + 33) % W;
    const sy = (i * 61 + 15) % 160;
    const twinkle = Math.sin(frameCount * 0.04 + i * 2.7) * 0.3 + 0.5;
    ctx.globalAlpha = twinkle;
    ctx.beginPath();
    ctx.ellipse(sx, sy, 0.8 + (i % 3) * 0.4, 0.8 + (i % 3) * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  
  // Southern Cross constellation
  ctx.fillStyle = '#ffffff';
  const crossStars = [[150, 50], [155, 70], [140, 62], [168, 60], [157, 82]];
  for (const [sx, sy] of crossStars) {
    ctx.beginPath();
    ctx.ellipse(sx, sy, 2, 2, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // Ayers Rock (Uluru) - center, massive monolith
  drawUluru(480, 310);
  
  // Red desert ground
  const groundGrad = ctx.createLinearGradient(0, 290, 0, 540);
  groundGrad.addColorStop(0, '#b85530');
  groundGrad.addColorStop(0.3, '#a04828');
  groundGrad.addColorStop(1, '#803820');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, 310, W, 230);
  
  // Cracked earth texture
  ctx.strokeStyle = 'rgba(60,25,10,0.25)';
  ctx.lineWidth = 0.8;
  for (let i = 0; i < 25; i++) {
    const cx = (i * 89 + 20) % W;
    const cy = 330 + (i * 47) % 150;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.sin(i * 3) * 20, cy + Math.cos(i * 2) * 15);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx - Math.cos(i * 4) * 18, cy + Math.sin(i * 1.5) * 12);
    ctx.stroke();
  }
  
  // Spinifex grass (round desert grass clumps)
  for (let i = 0; i < 15; i++) {
    const gx = (i * 73 + 40) % W;
    const gy = 350 + (i * 37) % 120;
    const sway = Math.sin(frameCount * 0.01 + i * 2) * 1.5;
    ctx.fillStyle = '#8a7830';
    ctx.beginPath();
    ctx.ellipse(gx + sway, gy, 10 + i % 5, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    // Grass blades sticking up
    ctx.strokeStyle = '#9a8838';
    ctx.lineWidth = 1;
    for (let b = 0; b < 5; b++) {
      ctx.beginPath();
      ctx.moveTo(gx - 5 + b * 3, gy);
      ctx.lineTo(gx - 5 + b * 3 + sway, gy - 8 - b % 3 * 3);
      ctx.stroke();
    }
  }
  
  // Dead tree silhouette
  ctx.strokeStyle = '#3a2010';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(100, 400); ctx.lineTo(100, 360);
  ctx.stroke();
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(100, 365); ctx.lineTo(85, 345);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(100, 370); ctx.lineTo(118, 350);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(100, 360); ctx.lineTo(95, 340);
  ctx.stroke();
  
  // Kangaroo silhouette (animated hopping)
  const hopPhase = Math.abs(Math.sin(frameCount * 0.02));
  const kanX = 780 + Math.sin(frameCount * 0.008) * 30;
  const kanY = 380 - hopPhase * 15;
  ctx.fillStyle = 'rgba(80,40,20,0.6)';
  // Body
  ctx.beginPath();
  ctx.ellipse(kanX, kanY, 12, 8, -0.2, 0, Math.PI * 2);
  ctx.fill();
  // Head
  ctx.beginPath();
  ctx.ellipse(kanX + 10, kanY - 10, 5, 4, -0.3, 0, Math.PI * 2);
  ctx.fill();
  // Ears
  ctx.beginPath();
  ctx.ellipse(kanX + 12, kanY - 15, 2, 4, -0.2, 0, Math.PI * 2);
  ctx.fill();
  // Tail
  ctx.strokeStyle = 'rgba(80,40,20,0.6)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(kanX - 12, kanY + 3);
  ctx.quadraticCurveTo(kanX - 22, kanY - 5, kanX - 25, kanY - 12);
  ctx.stroke();
  // Legs
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(kanX + 3, kanY + 7);
  ctx.lineTo(kanX + 5, kanY + 15 + hopPhase * 5);
  ctx.stroke();
  
  // Dust particles (wind)
  ctx.fillStyle = 'rgba(180,120,60,0.3)';
  for (let i = 0; i < 10; i++) {
    const dx = (frameCount * 0.8 + i * 100) % (W + 50) - 25;
    const dy = 320 + i * 18 + Math.sin(frameCount * 0.02 + i) * 5;
    ctx.beginPath();
    ctx.ellipse(dx, dy, 2, 1, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawUluru(x, y) {
  ctx.save();
  ctx.translate(x, y);
  
  // Main rock shape - massive rounded monolith
  const rockGrad = ctx.createLinearGradient(-180, -120, 180, 0);
  rockGrad.addColorStop(0, '#8b3a1a');
  rockGrad.addColorStop(0.3, '#cc4422');
  rockGrad.addColorStop(0.5, '#dd5533');
  rockGrad.addColorStop(0.7, '#cc4422');
  rockGrad.addColorStop(1, '#7a2a10');
  ctx.fillStyle = rockGrad;
  
  ctx.beginPath();
  ctx.moveTo(-180, 0);
  ctx.quadraticCurveTo(-180, -40, -160, -70);
  ctx.quadraticCurveTo(-130, -110, -80, -125);
  ctx.quadraticCurveTo(-30, -135, 0, -132);
  ctx.quadraticCurveTo(40, -135, 90, -122);
  ctx.quadraticCurveTo(140, -105, 165, -65);
  ctx.quadraticCurveTo(180, -35, 180, 0);
  ctx.closePath();
  ctx.fill();
  
  // Rock surface texture - vertical grooves
  ctx.strokeStyle = 'rgba(60,15,5,0.25)';
  ctx.lineWidth = 1.5;
  for (let i = 0; i < 15; i++) {
    const gx = -150 + i * 22;
    const topY = -70 - Math.sin((gx + 150) * 0.01) * 50;
    ctx.beginPath();
    ctx.moveTo(gx, topY);
    ctx.quadraticCurveTo(gx + Math.sin(i) * 3, topY / 2, gx + Math.sin(i * 2) * 2, 0);
    ctx.stroke();
  }
  
  // Highlight (sunlit side)
  ctx.fillStyle = 'rgba(255,150,80,0.15)';
  ctx.beginPath();
  ctx.ellipse(-40, -80, 60, 40, -0.2, 0, Math.PI * 2);
  ctx.fill();
  
  // Shadow at base
  ctx.fillStyle = 'rgba(40,10,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, 5, 185, 10, 0, 0, Math.PI * 2);
  ctx.fill();
  
  // Color-shifting glow (Uluru changes color at sunset)
  const colorShift = Math.sin(frameCount * 0.005) * 0.08;
  ctx.fillStyle = `rgba(255,100,0,${0.05 + colorShift})`;
  ctx.beginPath();
  ctx.moveTo(-180, 0);
  ctx.quadraticCurveTo(-180, -40, -160, -70);
  ctx.quadraticCurveTo(-130, -110, -80, -125);
  ctx.quadraticCurveTo(-30, -135, 0, -132);
  ctx.quadraticCurveTo(40, -135, 90, -122);
  ctx.quadraticCurveTo(140, -105, 165, -65);
  ctx.quadraticCurveTo(180, -35, 180, 0);
  ctx.closePath();
  ctx.fill();
  
  ctx.restore();
}

  ctx.fillStyle = 'rgba(255,220,150,0.3)';
  for (let i = 0; i < 4; i++) {
    const cx = (150 + i * 240 + frameCount * 0.05) % (W + 150) - 75;
    ctx.beginPath();
    ctx.ellipse(cx, 60 + i * 20, 65, 18, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // Thai temple (Wat-style) - center background
  drawThaiTemple(480, 310);
  
  // Smaller side temples
  ctx.globalAlpha = 0.5;
  drawThaiTemple(120, 300, 0.4);
  drawThaiTemple(840, 305, 0.35);
  ctx.globalAlpha = 1;
  
  // Ground - polished stone temple floor
  const floorGrad = ctx.createLinearGradient(0, 330, 0, 540);
  floorGrad.addColorStop(0, '#6a5a3a');
  floorGrad.addColorStop(0.5, '#5a4a2a');
  floorGrad.addColorStop(1, '#4a3a20');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(0, 340, W, 200);
  
  // Floor tiles
  ctx.strokeStyle = 'rgba(100,80,40,0.3)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 340); ctx.lineTo(x, 540); ctx.stroke();
  }
  for (let y = 340; y < 540; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  
  // Tile shimmer
  ctx.fillStyle = 'rgba(200,180,100,0.05)';
  for (let x = 0; x < W; x += 80) {
    for (let y = 340; y < 540; y += 80) {
      ctx.fillRect(x, y, 40, 40);
    }
  }
  
  // Incense smoke (animated wisps)
  for (let i = 0; i < 4; i++) {

    for (let s = 0; s < 6; s++) {
      const smokeY = 300 - s * 15 - (frameCount * 0.3 + i * 20) % 80;

      ctx.fill();
    }
  }
  
  // Lotus flowers in water (foreground pond)
  ctx.fillStyle = 'rgba(30,80,60,0.3)';
  ctx.beginPath();
  ctx.ellipse(480, 460, 200, 30, 0, 0, Math.PI * 2);
  ctx.fill();
  
  for (let i = 0; i < 5; i++) {
    const lx = 380 + i * 50;
    const ly = 458 + Math.sin(i * 2) * 5;
    const bob = Math.sin(frameCount * 0.02 + i * 1.5) * 1.5;
    // Lily pad
    ctx.fillStyle = '#2a8040';
    ctx.beginPath();
    ctx.ellipse(lx, ly + bob, 12, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    // Lotus flower
    if (i % 2 === 0) {
      ctx.fillStyle = '#ff88aa';
      for (let p = 0; p < 5; p++) {
        const angle = (p / 5) * Math.PI * 2 + frameCount * 0.002;
        ctx.beginPath();
        ctx.ellipse(lx + Math.cos(angle) * 4, ly - 4 + bob + Math.sin(angle) * 2, 4, 6, angle, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = '#ffcc44';
      ctx.beginPath();
      ctx.ellipse(lx, ly - 4 + bob, 3, 3, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  
  // Animated golden sparkles on temple
  for (let i = 0; i < 8; i++) {
    const sparkle = Math.sin(frameCount * 0.08 + i * 3) * 0.5 + 0.5;
    if (sparkle > 0.7) {
      const spx = 380 + (i * 37) % 200;
      const spy = 180 + (i * 53) % 100;
      ctx.fillStyle = `rgba(255,220,100,${sparkle})`;
      ctx.beginPath();
      ctx.ellipse(spx, spy, 2, 2, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

  ctx.moveTo(760, 190); ctx.lineTo(785, 203); ctx.lineTo(738, 202);

// ============================================================
// PARTICLES AND EFFECTS
// ============================================================
function addHitParticles(x, y, count, color) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x: x, y: y,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 0.5) * 8 - 3,
      life: 20 + Math.random() * 15,
      maxLife: 35,
      color: color || '#ffcc00',
      size: 2 + Math.random() * 4,
      type: 'hit'
    });
  }
}

function addDustParticles(x, y) {
  for (let i = 0; i < 5; i++) {
    particles.push({
      x: x + (Math.random() - 0.5) * 20,
      y: y,
      vx: (Math.random() - 0.5) * 3,
      vy: -Math.random() * 2,
      life: 15 + Math.random() * 10,
      maxLife: 25,
      color: '#aa8855',
      size: 3 + Math.random() * 5,
      type: 'dust'
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.3;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    if (p.type === 'hit') {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size, p.size, 0, 0, Math.PI * 2);
      ctx.fill();
      // Glow
      ctx.fillStyle = `rgba(255,255,200,${alpha * 0.3})`;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size * 2, p.size * 2, 0, 0, Math.PI * 2);
      ctx.fill();
    } else if (p.type === 'dust') {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = alpha * 0.5;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size, p.size * 0.7, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// INTRO SCREEN
// ============================================================
function updateIntro() {
  introTimer++;
  if (introTimer < 60) introPhase = 0;
  else if (introTimer < 120) introPhase = 1;
  else if (introTimer < 180) introPhase = 2;
  else introPhase = 3;
  
  if (introPhase >= 3 && (keys['Enter'] || keys[' '])) {
    gameState = STATE.SELECT;
    startMusic('select');
    keys['Enter'] = false;
    keys[' '] = false;
  }
}

function drawIntro() {
  // === SYNTHWAVE BACKGROUND ===
  // Deep dark purple/blue base
  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#0a0015');
  bgGrad.addColorStop(0.4, '#150030');
  bgGrad.addColorStop(0.65, '#2a0040');
  bgGrad.addColorStop(0.75, '#ff0066');
  bgGrad.addColorStop(0.8, '#ff3388');
  bgGrad.addColorStop(0.85, '#1a0030');
  bgGrad.addColorStop(1, '#0a0015');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);
  
  // Synthwave sun (large, with horizontal line slices)
  const sunY = 300;
  const sunR = 100;
  const sunGrad = ctx.createLinearGradient(480, sunY - sunR, 480, sunY + sunR);
  sunGrad.addColorStop(0, '#ff2277');
  sunGrad.addColorStop(0.4, '#ff6600');
  sunGrad.addColorStop(0.7, '#ffcc00');
  sunGrad.addColorStop(1, '#ff4488');
  ctx.fillStyle = sunGrad;
  ctx.beginPath();
  ctx.ellipse(480, sunY, sunR, sunR, 0, 0, Math.PI * 2);
  ctx.fill();
  
  // Sun horizontal slices (classic synthwave look)
  ctx.fillStyle = '#0a0015';
  for (let i = 0; i < 8; i++) {
    const sliceY = sunY + 10 + i * 11;
    const sliceH = 3 + i * 1.5;
    ctx.fillRect(480 - sunR, sliceY, sunR * 2, sliceH);
  }
  
  // Sun glow
  ctx.fillStyle = 'rgba(255,50,100,0.08)';
  ctx.beginPath();
  ctx.ellipse(480, sunY, sunR + 50, sunR + 50, 0, 0, Math.PI * 2);
  ctx.fill();
  
  // Perspective grid floor (synthwave grid)
  const horizonY = 340;
  ctx.strokeStyle = 'rgba(255,0,150,0.4)';
  ctx.lineWidth = 1;
  
  // Horizontal lines (receding into distance)
  for (let i = 0; i < 15; i++) {
    const t = i / 15;
    const y = horizonY + t * t * (H - horizonY);
    const alpha = 0.15 + t * 0.35;
    ctx.strokeStyle = `rgba(255,0,150,${alpha})`;
    ctx.lineWidth = 0.5 + t * 1.5;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }
  
  // Vertical lines (perspective converging to center)
  ctx.lineWidth = 1;
  for (let i = -12; i <= 12; i++) {
    const bottomX = 480 + i * 50;
    const alpha = 0.2 + Math.abs(i) * 0.02;
    ctx.strokeStyle = `rgba(255,0,150,${Math.min(0.5, alpha)})`;
    ctx.beginPath();
    ctx.moveTo(480, horizonY);
    ctx.lineTo(bottomX, H + 20);
    ctx.stroke();
  }
  
  // Animated grid scroll effect
  const gridScroll = (frameCount * 2) % 50;
  ctx.strokeStyle = 'rgba(255,100,200,0.2)';
  ctx.lineWidth = 1.5;
  for (let i = 0; i < 5; i++) {
    const t = (i * 50 + gridScroll) / (H - horizonY);
    if (t > 1) continue;
    const y = horizonY + t * t * (H - horizonY);
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }
  
  // Stars in the sky
  ctx.fillStyle = '#ffffff';
  for (let i = 0; i < 50; i++) {
    const sx = (i * 137 + 23) % W;
    const sy = (i * 89 + 11) % (horizonY - 50);
    const twinkle = Math.sin(frameCount * 0.03 + i * 2.3) * 0.4 + 0.5;
    ctx.globalAlpha = twinkle * 0.7;
    ctx.beginPath();
    ctx.ellipse(sx, sy, 1, 1, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  
  // === LIGHTNING BOLTS ===
  // Random lightning flashes
  const lightningActive = Math.sin(frameCount * 0.02) > 0.92 || Math.sin(frameCount * 0.037) > 0.95;
  if (lightningActive) {
    drawLightningBolt(120 + Math.sin(frameCount * 0.1) * 80, 0, 120 + Math.sin(frameCount * 0.1) * 80 + 30, 200);
    // Flash effect
    ctx.fillStyle = 'rgba(200,180,255,0.05)';
    ctx.fillRect(0, 0, W, H);
  }
  
  const lightningActive2 = Math.sin(frameCount * 0.031) > 0.93;
  if (lightningActive2) {
    drawLightningBolt(780 + Math.cos(frameCount * 0.08) * 60, 0, 800 + Math.cos(frameCount * 0.08) * 60 - 20, 180);
  }
  
  // Constant subtle side lightning
  if (frameCount % 120 < 8) {
    drawLightningBolt(50 + (frameCount * 7) % 100, 20, 80 + (frameCount * 7) % 100, 150);
  }
  if (frameCount % 150 < 6) {
    drawLightningBolt(800 + (frameCount * 3) % 80, 30, 820 + (frameCount * 3) % 80, 140);
  }
  
  // === TITLE AND TEXT ===
  // Phase-based reveal
  if (introPhase >= 0) {
    // Neon glow behind title
    const glowSize = Math.min(1, introTimer / 60);
    const glowPulse = Math.sin(frameCount * 0.04) * 0.1 + 0.9;
    ctx.fillStyle = `rgba(255,0,100,${0.15 * glowSize * glowPulse})`;
    ctx.beginPath();
    ctx.ellipse(480, 170, 320 * glowSize, 80 * glowSize, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = `rgba(100,0,255,${0.1 * glowSize * glowPulse})`;
    ctx.beginPath();
    ctx.ellipse(480, 170, 280 * glowSize, 60 * glowSize, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  
  if (introPhase >= 1) {
    // Title text - neon synthwave style
    const titleScale = Math.min(1.2, (introTimer - 60) / 30);
    ctx.save();
    ctx.translate(480, 160);
    ctx.scale(titleScale, titleScale);
    ctx.font = 'bold 54px monospace';
    ctx.textAlign = 'center';
    
    // Multiple neon glow layers
    const neonPulse = Math.sin(frameCount * 0.06) * 0.15 + 0.85;
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#ff0066';
    ctx.fillStyle = `rgba(255,0,100,${0.3 * neonPulse})`;
    ctx.fillText('ANIMAL FIGHTERS', 0, 0);
    
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#ff00ff';
    ctx.fillStyle = '#ff2288';
    ctx.fillText('ANIMAL FIGHTERS', 0, 0);
    
    ctx.shadowBlur = 0;
    // Chrome/metallic main text
    const textGrad = ctx.createLinearGradient(0, -25, 0, 25);
    textGrad.addColorStop(0, '#ffffff');
    textGrad.addColorStop(0.3, '#ff88cc');
    textGrad.addColorStop(0.5, '#ffffff');
    textGrad.addColorStop(0.7, '#88ccff');
    textGrad.addColorStop(1, '#ff44aa');
    ctx.fillStyle = textGrad;
    ctx.fillText('ANIMAL FIGHTERS', 0, 0);
    
    ctx.restore();
  }
  
  if (introPhase >= 2) {
    // Subtitle - cyan neon
    ctx.save();
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center';
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#00ffff';
    ctx.fillStyle = '#00ffdd';
    ctx.fillText('ULTIMATE SHOWDOWN', 480, 210);
    ctx.shadowBlur = 0;
    ctx.restore();
    
    // Character silhouettes with neon outlines
    const silAlpha = Math.min(1, (introTimer - 120) / 30);
    ctx.globalAlpha = silAlpha;
    
    // Neon floor reflection under characters
    ctx.fillStyle = 'rgba(255,0,150,0.1)';
    ctx.beginPath();
    ctx.ellipse(200, 440, 50, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(0,200,255,0.1)';
    ctx.beginPath();
    ctx.ellipse(480, 440, 50, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,200,0,0.1)';
    ctx.beginPath();
    ctx.ellipse(760, 440, 50, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    
    drawCharacterPortrait(ctx, 0, 200, 390, 1.5, { facing: 1, state: 'idle', animFrame: frameCount });
    drawCharacterPortrait(ctx, 1, 480, 390, 1.5, { facing: 1, state: 'idle', animFrame: frameCount });
    drawCharacterPortrait(ctx, 2, 760, 390, 1.5, { facing: -1, state: 'idle', animFrame: frameCount });
    ctx.globalAlpha = 1;
  }
  
  if (introPhase >= 3) {
    // Press start - pulsing neon
    const blinkAlpha = Math.sin(frameCount * 0.08) * 0.4 + 0.6;
    ctx.save();
    ctx.font = 'bold 18px monospace';
    ctx.textAlign = 'center';
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#00ffff';
    ctx.fillStyle = `rgba(0,255,255,${blinkAlpha})`;
    ctx.fillText('PRESS ENTER TO START', 480, 500);
    ctx.shadowBlur = 0;
    ctx.restore();
  }
  
  // Scanline overlay (CRT effect)
  ctx.fillStyle = 'rgba(0,0,0,0.03)';
  for (let y = 0; y < H; y += 3) {
    ctx.fillRect(0, y, W, 1);
  }
  
  // Vignette (dark edges)
  const vigGrad = ctx.createRadialGradient(480, 270, 200, 480, 270, 500);
  vigGrad.addColorStop(0, 'rgba(0,0,0,0)');
  vigGrad.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = vigGrad;
  ctx.fillRect(0, 0, W, H);
  
  ctx.textAlign = 'left';
}

function drawLightningBolt(x1, y1, x2, y2) {
  const segments = 8;
  ctx.strokeStyle = 'rgba(180,150,255,0.8)';
  ctx.lineWidth = 2.5;
  ctx.shadowBlur = 8;
  ctx.shadowColor = '#aa88ff';
  
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  let cx = x1, cy = y1;
  for (let i = 1; i <= segments; i++) {
    const t = i / segments;
    const tx = x1 + (x2 - x1) * t + (Math.random() - 0.5) * 40;
    const ty = y1 + (y2 - y1) * t;
    ctx.lineTo(tx, ty);
    cx = tx; cy = ty;
    
    // Branch (30% chance)
    if (Math.random() < 0.3 && i < segments - 1) {
      ctx.stroke();
      ctx.strokeStyle = 'rgba(150,120,255,0.4)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(tx, ty);
      ctx.lineTo(tx + (Math.random() - 0.5) * 50, ty + 20 + Math.random() * 30);
      ctx.stroke();
      // Resume main bolt
      ctx.strokeStyle = 'rgba(180,150,255,0.8)';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(tx, ty);
    }
  }
  ctx.stroke();
  
  // Bright core
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  cx = x1; cy = y1;
  for (let i = 1; i <= segments; i++) {
    const t = i / segments;
    const tx = x1 + (x2 - x1) * t + (Math.random() - 0.5) * 20;
    const ty = y1 + (y2 - y1) * t;
    ctx.lineTo(tx, ty);
  }
  ctx.stroke();
  
  ctx.shadowBlur = 0;
}

// CHARACTER SELECT SCREEN
// ============================================================
function updateSelect() {
  if (!selectConfirmed) {
    if (keys['ArrowLeft'] || keys['a']) { selectCursor = (selectCursor + 2) % 3; keys['ArrowLeft'] = false; keys['a'] = false; playSFX('select'); }
    if (keys['ArrowRight'] || keys['d']) { selectCursor = (selectCursor + 1) % 3; keys['ArrowRight'] = false; keys['d'] = false; playSFX('select'); }
    if (keys['Enter'] || keys[' ']) {
      selectConfirmed = true;
      p1.char = selectCursor;
      // AI picks a different character
      do { p2Char = Math.floor(Math.random() * 3); } while (p2Char === selectCursor);
      p2.char = p2Char;
      playSFX('confirm');
      keys['Enter'] = false;
      keys[' '] = false;
      setTimeout(() => {
        gameState = STATE.LEVEL_SELECT;
        selectConfirmed = false;
        levelConfirmed = false;
        levelCursor = 0;
      }, 1000);
    }
  }
}

function drawSelect() {
  // Background
  ctx.fillStyle = '#0a0a20';
  ctx.fillRect(0, 0, W, H);
  
  // Background pattern (hex grid subtle)
  ctx.strokeStyle = 'rgba(100,100,200,0.1)';
  ctx.lineWidth = 0.5;
  for (let row = 0; row < 15; row++) {
    for (let col = 0; col < 20; col++) {
      const hx = col * 50 + (row % 2) * 25;
      const hy = row * 40;
      drawHexagon(hx, hy, 22);
    }
  }
  
  // Title
  ctx.font = 'bold 28px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffcc00';
  ctx.fillText('SELECT YOUR FIGHTER', 480, 40);
  
  // Character cards
  for (let i = 0; i < 3; i++) {
    const cx = 160 + i * 320;
    const cy = 290;
    const selected = i === selectCursor;
    const confirmed = selectConfirmed && i === selectCursor;
    
    // Card background
    ctx.fillStyle = selected ? 'rgba(50,50,100,0.8)' : 'rgba(20,20,40,0.8)';
    ctx.fillRect(cx - 110, cy - 180, 220, 360);
    
    // Gold border for selected
    ctx.strokeStyle = selected ? '#ffcc00' : '#444466';
    ctx.lineWidth = selected ? 3 : 1;
    ctx.strokeRect(cx - 110, cy - 180, 220, 360);
    
    // Confirmed flash
    if (confirmed && Math.floor(frameCount / 8) % 2 === 0) {
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 4;
      ctx.strokeRect(cx - 112, cy - 182, 224, 364);
    }
    
    // Character portrait (large)
    ctx.save();
    ctx.beginPath();
    ctx.rect(cx - 105, cy - 175, 210, 250);
    ctx.clip();
    drawCharacterPortrait(ctx, i, cx, cy + 40, 2.5, { facing: 1, state: 'idle', animFrame: frameCount, breathe: Math.sin(frameCount * 0.04 + i) * 2 });
    ctx.restore();
    
    // Name plate
    ctx.fillStyle = '#1a1a2a';
    ctx.fillRect(cx - 100, cy + 90, 200, 35);
    ctx.strokeStyle = selected ? '#ffcc00' : '#333355';
    ctx.lineWidth = 1;
    ctx.strokeRect(cx - 100, cy + 90, 200, 35);
    
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = selected ? '#ffcc00' : '#aaaacc';
    ctx.fillText(CHARS[i].name, cx, cy + 112);
    
    // Stats
    ctx.font = '10px monospace';
    ctx.textAlign = 'left';
    const stats = ['SPD', 'PWR', 'DEF'];
    const vals = [CHARS[i].speed, CHARS[i].power, CHARS[i].defense];
    for (let s = 0; s < 3; s++) {
      const sy = cy + 135 + s * 16;
      ctx.fillStyle = '#888';
      ctx.fillText(stats[s], cx - 90, sy);
      // Stat bar background
      ctx.fillStyle = '#222';
      ctx.fillRect(cx - 55, sy - 8, 140, 10);
      // Stat bar fill
      const statColor = s === 0 ? '#00aaff' : s === 1 ? '#ff4444' : '#44cc44';
      ctx.fillStyle = statColor;
      ctx.fillRect(cx - 55, sy - 8, 140 * (vals[s] / 10), 10);
      // Stat bar border
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(cx - 55, sy - 8, 140, 10);
    }
  }
  
  // Style name
  ctx.font = '12px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#aaa';
  ctx.fillText('Style: ' + CHARS[selectCursor].style, 480, 505);
  
  // Instructions
  if (!selectConfirmed) {
    ctx.font = '12px monospace';
    ctx.fillStyle = '#888';
    ctx.fillText('< LEFT/RIGHT to select | ENTER to confirm >', 480, 530);
  }
  
  ctx.textAlign = 'left';
}

function drawHexagon(x, y, r) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI / 3) * i - Math.PI / 6;
    const px = x + r * Math.cos(angle);
    const py = y + r * Math.sin(angle);
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.stroke();
}

// LEVEL SELECT SCREEN
// ============================================================
function updateLevelSelect() {
  if (!levelConfirmed) {
    if (keys['ArrowLeft'] || keys['a']) { levelCursor = (levelCursor + LEVELS.length - 1) % LEVELS.length; keys['ArrowLeft'] = false; keys['a'] = false; playSFX('select'); }
    if (keys['ArrowRight'] || keys['d']) { levelCursor = (levelCursor + 1) % LEVELS.length; keys['ArrowRight'] = false; keys['d'] = false; playSFX('select'); }
    if (keys['ArrowUp'] || keys['w']) { levelCursor = (levelCursor + LEVELS.length - 1) % LEVELS.length; keys['ArrowUp'] = false; keys['w'] = false; playSFX('select'); }
    if (keys['ArrowDown'] || keys['s']) { levelCursor = (levelCursor + 1) % LEVELS.length; keys['ArrowDown'] = false; keys['s'] = false; playSFX('select'); }
    if (keys['Enter'] || keys[' ']) {
      levelConfirmed = true;
      // Handle random selection
      if (levelCursor === LEVELS.length - 1) {
        selectedLevel = Math.floor(Math.random() * (LEVELS.length - 1));
      } else {
        selectedLevel = levelCursor;
      }
      playSFX('confirm');
      keys['Enter'] = false;
      keys[' '] = false;
      setTimeout(() => { startFight(); }, 1200);
    }
  }
}

function drawLevelSelect() {
  // Bright blue ocean background (SF2 style)
  ctx.fillStyle = '#1060c0';

  ctx.strokeStyle = '#ffcc00';

  ctx.moveTo(0, 42); ctx.lineTo(W, 42);

  for (let i = 0; i < LEVELS.length; i++) {

    const isRandom = i === LEVELS.length - 1;

    const pulse = selected ? Math.sin(frameCount * 0.1) * 2 : 0;

    if (selected) {
      ctx.strokeStyle = '#ffffff';

      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.moveTo(lvl.mapX, lvl.mapY + markerSize + 2);

      ctx.stroke();
      ctx.setLineDash([]);
    }
    
    // Glow ring for selected
    if (selected) {
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(lvl.mapX, lvl.mapY, markerSize + 6, markerSize + 6, 0, 0, Math.PI * 2);
      ctx.stroke();
      // Animated outer ring
      ctx.strokeStyle = `rgba(255,255,255,${0.3 + Math.sin(frameCount * 0.08) * 0.2})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.ellipse(lvl.mapX, lvl.mapY, markerSize + 10 + pulse, markerSize + 10 + pulse, 0, 0, Math.PI * 2);
      ctx.stroke();
    }
    
    // Marker background (dark circle)
    ctx.fillStyle = '#000000';
    ctx.beginPath();
    ctx.ellipse(lvl.mapX, lvl.mapY, markerSize + 2, markerSize + 2, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Marker circle with country color
    ctx.fillStyle = selected ? lvl.color : shadeColor(lvl.color, -40);
    ctx.beginPath();
    ctx.ellipse(lvl.mapX, lvl.mapY, markerSize, markerSize, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Inner highlight
    ctx.fillStyle = selected ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.1)';
    ctx.beginPath();
    ctx.ellipse(lvl.mapX - 2, lvl.mapY - 3, markerSize * 0.5, markerSize * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Border
    ctx.strokeStyle = selected ? '#ffffff' : '#333';
    ctx.lineWidth = selected ? 2.5 : 1.5;
    ctx.beginPath();
    ctx.ellipse(lvl.mapX, lvl.mapY, markerSize, markerSize, 0, 0, Math.PI * 2);
    ctx.stroke();
    
    // Confirmed flash
    if (confirmed && Math.floor(frameCount / 5) % 2 === 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.beginPath();
      ctx.ellipse(lvl.mapX, lvl.mapY, markerSize + 3, markerSize + 3, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    
    // Icon/text inside marker
    ctx.font = isRandom ? 'bold 18px monospace' : 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffffff';
    if (isRandom) {
      ctx.fillText('?', lvl.mapX, lvl.mapY + 6);
    } else {
      // Draw small flag-like icon
      drawCountryIcon(lvl.mapX, lvl.mapY, i, markerSize);
    }
    
    // Country name label (selected only)
    if (selected) {
      // Label background
      const labelW = ctx.measureText(lvl.name).width + 12;

      ctx.fillRect(lvl.mapX - textW/2, lvl.mapY + markerSize + 18, textW, 16);

      ctx.lineWidth = 1;
      ctx.strokeRect(lvl.mapX - textW/2, lvl.mapY + markerSize + 18, textW, 16);
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.fillText(lvl.name, lvl.mapX, lvl.mapY + markerSize + 30);
